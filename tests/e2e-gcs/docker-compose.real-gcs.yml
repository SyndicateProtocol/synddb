# Override file for testing against real GCS
#
# This disables the fake-gcs-server and configures services to use real GCS.
# Requires GCS_BUCKET and GOOGLE_APPLICATION_CREDENTIALS environment variables.
#
# Setup:
#   ./tests/e2e-gcs/setup-real-gcs.sh
#
# Usage (via cargo test):
#   REAL_GCS=true \
#   GCS_BUCKET=synddb-e2e-test \
#   GOOGLE_APPLICATION_CREDENTIALS=tests/e2e-gcs/.credentials/service-account.json \
#     cargo test -p synddb-e2e-gcs
#
# Usage (direct docker compose):
#   GCS_BUCKET=synddb-e2e-test \
#   GOOGLE_APPLICATION_CREDENTIALS=tests/e2e-gcs/.credentials/service-account.json \
#     docker compose -f tests/e2e-gcs/docker-compose.yml \
#       -f tests/e2e-gcs/docker-compose.real-gcs.yml up --build \
#       --abort-on-container-exit --exit-code-from e2e_assertions

services:
  # Make fake-gcs a no-op stub that stays alive
  fake-gcs:
    image: busybox:1.36
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep 86400"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  # Make init-bucket a no-op stub that stays alive (bucket already exists in real GCS)
  init-bucket:
    image: busybox:1.36
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep 86400"]
    depends_on: []
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  # Sequencer uses real GCS
  sequencer:
    environment:
      RUST_LOG: info,synddb_sequencer=debug
      BIND_ADDRESS: "0.0.0.0:8433"
      SIGNING_KEY: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      PUBLISHER_TYPE: gcs
      GCS_BUCKET: ${GCS_BUCKET:?GCS_BUCKET must be set}
      GCS_PREFIX: sequencer-test-${TEST_RUN_ID:-default}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
      # Unset emulator host to use real GCS
      GCS_STORAGE_EMULATOR_HOST: ""
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:?GOOGLE_APPLICATION_CREDENTIALS must be set}:/app/credentials.json:ro

  # Validator 1 uses real GCS
  validator:
    environment:
      RUST_LOG: info,synddb_validator=debug
      BIND_ADDRESS: "0.0.0.0:8080"
      # 64-byte uncompressed public key (derived from SIGNING_KEY above)
      SEQUENCER_PUBKEY: "8318535b54105d4a7aae60c08fc45f9687181b4fdfc625bd1a753fa7397fed753547f11ca8696646f2f3acb08e31016afac23e630c5d11f59f61fef57b0d2aa5"
      FETCHER_TYPE: gcs
      GCS_BUCKET: ${GCS_BUCKET}
      GCS_PREFIX: sequencer-test-${TEST_RUN_ID:-default}
      DATABASE_PATH: ":memory:"
      STATE_DB_PATH: ":memory:"
      SYNC_INTERVAL: "1s"
      BATCH_SYNC_ENABLED: "true"
      BATCH_INDEX_REFRESH_INTERVAL: "5s"
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
      # Unset emulator host to use real GCS
      GCS_STORAGE_EMULATOR_HOST: ""
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json:ro

  # Validator 2 uses real GCS
  validator2:
    environment:
      RUST_LOG: info,synddb_validator=debug
      BIND_ADDRESS: "0.0.0.0:8080"
      # 64-byte uncompressed public key (derived from SIGNING_KEY above)
      SEQUENCER_PUBKEY: "8318535b54105d4a7aae60c08fc45f9687181b4fdfc625bd1a753fa7397fed753547f11ca8696646f2f3acb08e31016afac23e630c5d11f59f61fef57b0d2aa5"
      FETCHER_TYPE: gcs
      GCS_BUCKET: ${GCS_BUCKET}
      GCS_PREFIX: sequencer-test-${TEST_RUN_ID:-default}
      DATABASE_PATH: ":memory:"
      STATE_DB_PATH: ":memory:"
      SYNC_INTERVAL: "1s"
      BATCH_SYNC_ENABLED: "true"
      BATCH_INDEX_REFRESH_INTERVAL: "5s"
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
      # Unset emulator host to use real GCS
      GCS_STORAGE_EMULATOR_HOST: ""
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json:ro
