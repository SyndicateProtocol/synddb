# E2E Test for SyndDB with GCS Storage Layer
#
# Tests the full flow: Customer App → Sequencer (GCS) → Validator (GCS)
#
# Two modes:
#   1. Emulator mode (default): Uses fake-gcs-server locally
#   2. Real GCS mode: Uses actual GCS bucket (for manual testing, not CI)
#
# Usage (emulator mode):
#   docker compose -f tests/e2e-gcs/docker-compose.yml up --build \
#     --abort-on-container-exit --exit-code-from e2e_assertions
#
# Usage (real GCS mode):
#   export GCS_BUCKET=your-real-bucket
#   export GOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json
#   docker compose -f tests/e2e-gcs/docker-compose.yml \
#     -f tests/e2e-gcs/docker-compose.real-gcs.yml up --build \
#     --abort-on-container-exit --exit-code-from e2e_assertions
#
# Exit codes:
#   0 = All assertions passed
#   1 = Assertions failed
#
# Note: This test requires the sequencer to be built with --features gcs

services:
  # GCS Emulator (disabled via docker-compose.real-gcs.yml for real GCS testing)
  fake-gcs:
    image: fsouza/fake-gcs-server:1.52.2
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory", "-log-level", "info"]
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  # Initialize bucket for emulator (disabled via docker-compose.real-gcs.yml for real GCS)
  # This container creates the bucket and then stays alive to avoid triggering --abort-on-container-exit
  init-bucket:
    image: curlimages/curl:8.11.0
    depends_on:
      fake-gcs:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -sf -X POST "http://fake-gcs:4443/storage/v1/b?project=test-project" \
          -H "Content-Type: application/json" \
          -d '{"name": "synddb-test"}' && \
        echo "Bucket created successfully" && \
        sleep infinity
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 1s
      retries: 1

  # Sequencer with GCS publisher
  sequencer:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: sequencer-gcs
    environment:
      RUST_LOG: info,synddb_sequencer=debug,google_cloud_storage=debug,reqwest=debug
      BIND_ADDRESS: "0.0.0.0:8433"
      SIGNING_KEY: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      PUBLISHER_TYPE: gcs
      GCS_BUCKET: synddb-test
      GCS_PREFIX: sequencer
      GCS_STORAGE_EMULATOR_HOST: "http://fake-gcs:4443"
    depends_on:
      init-bucket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8433/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Validator 1 with GCS fetcher
  validator:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: validator
    environment:
      RUST_LOG: info,synddb_validator=debug,google_cloud_storage=debug
      BIND_ADDRESS: "0.0.0.0:8080"
      SEQUENCER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      FETCHER_TYPE: gcs
      GCS_BUCKET: synddb-test
      GCS_PREFIX: sequencer
      DATABASE_PATH: ":memory:"
      STATE_DB_PATH: ":memory:"
      SYNC_INTERVAL: "1s"
      BATCH_SYNC_ENABLED: "true"
      BATCH_INDEX_REFRESH_INTERVAL: "5s"
      GCS_STORAGE_EMULATOR_HOST: "http://fake-gcs:4443"
    depends_on:
      sequencer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Validator 2 for multi-validator testing
  validator2:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: validator
    environment:
      RUST_LOG: info,synddb_validator=debug,google_cloud_storage=debug
      BIND_ADDRESS: "0.0.0.0:8080"
      SEQUENCER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      FETCHER_TYPE: gcs
      GCS_BUCKET: synddb-test
      GCS_PREFIX: sequencer
      DATABASE_PATH: ":memory:"
      STATE_DB_PATH: ":memory:"
      SYNC_INTERVAL: "1s"
      BATCH_SYNC_ENABLED: "true"
      BATCH_INDEX_REFRESH_INTERVAL: "5s"
      GCS_STORAGE_EMULATOR_HOST: "http://fake-gcs:4443"
    depends_on:
      sequencer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Customer app: orderbook benchmark generating changesets
  customer_app:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: customer-app
    environment:
      RUST_LOG: info
      SEQUENCER_URL: "http://sequencer:8433"
    depends_on:
      sequencer:
        condition: service_healthy
    # Run for 20 seconds at 50 ops/sec = ~1000 changesets
    command: ["run", "--db", "/tmp/orderbook.db", "--simple", "--duration", "20", "--rate", "50"]

  # E2E test runner
  e2e_assertions:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: e2e
    environment:
      RUST_LOG: info
      SEQUENCER_URL: "http://sequencer:8433"
      VALIDATOR_URL: "http://validator:8080"
      VALIDATOR2_URL: "http://validator2:8080"
      STARTUP_WAIT: "5"
      DATA_WAIT: "25"
      MAX_SYNC_DIFF: "5"
      # Skip storage API tests - GCS doesn't expose /storage/* endpoints on sequencer
      SKIP_STORAGE_TESTS: "true"
    depends_on:
      validator:
        condition: service_healthy
      validator2:
        condition: service_healthy
      customer_app:
        condition: service_started
