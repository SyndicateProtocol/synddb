[package]
name = "gcp-cs-attestation-sp1-script"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[[bin]]
name = "gcp-cs-prover"
path = "src/main.rs"

[[bin]]
name = "sp1-vkey"
path = "src/vkey.rs"

[dependencies]
alloy = { version = "1.0", features = ["sol-types"] }
clap = { version = "4.5", features = ["derive"] }
# GCP attestation verification
gcp-attestation = { path = "../../../../crates/gcp-attestation" }

# SP1 program types (PublicValuesStruct for decoding proof outputs)
gcp-cs-attestation-sp1-program = { path = "../../../../crates/synddb-bootstrap/sp1/program", default-features = false }
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sp1-sdk = "5.2"

[build-dependencies]
sp1-build = "5.2"
