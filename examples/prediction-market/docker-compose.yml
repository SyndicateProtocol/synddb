services:
  sequencer:
    build:
      context: ../..
      dockerfile: docker/local.Dockerfile
      target: sequencer
    environment:
      - SIGNING_KEY=ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - RUST_LOG=info
      - BIND_ADDRESS=0.0.0.0:8433
    ports:
      - "8433:8433"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8433/health"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  prediction-market:
    build:
      context: ../..
      dockerfile: examples/prediction-market/Dockerfile
    environment:
      - SEQUENCER_URL=http://sequencer:8433
      - RUST_LOG=info
    volumes:
      - market-data:/data
    depends_on:
      sequencer:
        condition: service_healthy
    # Keep container running for test commands
    entrypoint: ["sleep", "infinity"]

volumes:
  market-data:
