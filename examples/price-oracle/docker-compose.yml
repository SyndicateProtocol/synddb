# Price Oracle Example - Docker Compose
#
# Usage:
#   docker compose up --build
#   docker compose down -v
#
# Configuration:
#   Uses shared config from ../../.env.docker
#   See also: justfile for the single source of truth

services:
  sequencer:
    build:
      context: ../..
      dockerfile: examples/price-oracle/Dockerfile
    entrypoint: ["/usr/local/bin/synddb-sequencer"]
    env_file:
      - ../../.env.docker
    environment:
      HTTP_PORT: 8433
    ports:
      - "8433:8433"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8433/health"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  price-oracle:
    build:
      context: ../..
      dockerfile: examples/price-oracle/Dockerfile
    env_file:
      - ../../.env.docker
    environment:
      SEQUENCER_URL: http://sequencer:8433
      DATABASE_PATH: /data/price-oracle.db
    volumes:
      - oracle-data:/data
    depends_on:
      sequencer:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

volumes:
  oracle-data:
