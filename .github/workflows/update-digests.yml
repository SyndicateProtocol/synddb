# Automated weekly check for Docker base image digest updates
#
# Checks rust, debian, and distroless base images used in reproducible builds.
# Opens a PR if updates are available, allowing human review before merging.
#
# Manual trigger: gh workflow run update-digests.yml

name: Update Docker Digests

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Fetch latest digests
        id: digests
        run: |
          set -euo pipefail

          # Read image names from justfile (single source of truth)
          RUST_IMAGE=$(just --evaluate repro_rust_image)
          DEBIAN_IMAGE=$(just --evaluate repro_debian_image)
          DISTROLESS_IMAGE=$(just --evaluate repro_distroless_image)

          # Fetch latest digests
          RUST_NEW=$(docker manifest inspect "$RUST_IMAGE" -v | jq -r '.Descriptor.digest // .digest')
          DEBIAN_NEW=$(docker manifest inspect "$DEBIAN_IMAGE" -v | jq -r '.Descriptor.digest // .digest')
          DISTROLESS_NEW=$(docker manifest inspect "$DISTROLESS_IMAGE" -v | jq -r '.Descriptor.digest // .digest')

          # Get current digests from Dockerfiles
          RUST_CURRENT=$(grep 'ARG RUST_IMAGE_DIGEST=' docker/reproducible/sequencer.Dockerfile | head -1 | cut -d= -f2)
          DEBIAN_CURRENT=$(grep 'ARG DEBIAN_IMAGE_DIGEST=' docker/reproducible/sequencer.Dockerfile | head -1 | cut -d= -f2)
          DISTROLESS_CURRENT=$(grep 'ARG DISTROLESS_IMAGE_DIGEST=' docker/reproducible/sequencer.Dockerfile | head -1 | cut -d= -f2)

          # Build summary
          echo "## Digest Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          UPDATES=""

          if [ "$RUST_NEW" != "$RUST_CURRENT" ]; then
            echo "- **$RUST_IMAGE**: Update available" >> $GITHUB_STEP_SUMMARY
            echo "  - Current: \`$RUST_CURRENT\`" >> $GITHUB_STEP_SUMMARY
            echo "  - Latest: \`$RUST_NEW\`" >> $GITHUB_STEP_SUMMARY
            UPDATES="${UPDATES}rust,"
          else
            echo "- **$RUST_IMAGE**: Up to date" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$DEBIAN_NEW" != "$DEBIAN_CURRENT" ]; then
            echo "- **$DEBIAN_IMAGE**: Update available" >> $GITHUB_STEP_SUMMARY
            echo "  - Current: \`$DEBIAN_CURRENT\`" >> $GITHUB_STEP_SUMMARY
            echo "  - Latest: \`$DEBIAN_NEW\`" >> $GITHUB_STEP_SUMMARY
            UPDATES="${UPDATES}debian,"
          else
            echo "- **$DEBIAN_IMAGE**: Up to date" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$DISTROLESS_NEW" != "$DISTROLESS_CURRENT" ]; then
            echo "- **$DISTROLESS_IMAGE**: Update available" >> $GITHUB_STEP_SUMMARY
            echo "  - Current: \`$DISTROLESS_CURRENT\`" >> $GITHUB_STEP_SUMMARY
            echo "  - Latest: \`$DISTROLESS_NEW\`" >> $GITHUB_STEP_SUMMARY
            UPDATES="${UPDATES}distroless,"
          else
            echo "- **$DISTROLESS_IMAGE**: Up to date" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$UPDATES" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Creating PR with updates..." >> $GITHUB_STEP_SUMMARY
            echo "updates_available=true" >> $GITHUB_OUTPUT
            echo "updated_images=${UPDATES%,}" >> $GITHUB_OUTPUT
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All digests are up to date." >> $GITHUB_STEP_SUMMARY
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Update digests
        if: steps.digests.outputs.updates_available == 'true'
        run: just --yes update-digests

      - name: Create Pull Request
        if: steps.digests.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore(docker): update base image digests"
          body: |
            Automated weekly update of base image digests for reproducible builds.

            **Updated images:** ${{ steps.digests.outputs.updated_images }}

            ## Review checklist
            - [ ] CI passes (reproducible images build successfully)
            - [ ] No breaking changes in upstream base images

            ## Testing
            After merging, the reproducible-builds workflow will automatically build and publish new images.

            To verify locally:
            ```bash
            just repro-all
            ```
          branch: chore/update-docker-digests
          commit-message: |
            chore(docker): update base image digests

            Updated: ${{ steps.digests.outputs.updated_images }}
          labels: |
            dependencies
            docker
          delete-branch: true
