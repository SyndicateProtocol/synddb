name: Rust Tests & Benchmarks

on:
  # Run workflow on every push to main (always run to ensure cross-service compatibility)
  push:
    branches:
      - main
  # Only run on pull requests when Rust code is modified
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-tests.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # GitHub Actions supports rustup by default, so we can install the toolchain directly
      # selecting a toolchain either by action or manual `rustup` calls should happen
      # before the plugin, as the cache uses the current rustc version as its cache key
      - run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to compare with main

      - run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build benchmark tool (release mode)
        run: cargo build --package synddb-benchmark --release

      # Cache key based on the baseline commit SHA
      - name: Get baseline commit SHA
        id: baseline-sha
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, compare against main branch
            BASELINE_SHA=$(git rev-parse origin/main)
            echo "Baseline: main branch ($BASELINE_SHA)"
          else
            # For pushes to main, compare against previous commit
            BASELINE_SHA=$(git rev-parse HEAD~1)
            echo "Baseline: previous commit ($BASELINE_SHA)"
          fi
          echo "sha=$BASELINE_SHA" >> $GITHUB_OUTPUT

      - name: Restore cached baseline benchmarks
        id: cache-baseline
        uses: actions/cache@v4
        with:
          path: |
            bench-baseline-simple.log
            bench-baseline-full.log
          key: benchmark-baseline-${{ steps.baseline-sha.outputs.sha }}

      - name: Run benchmarks on current commit (simple)
        id: current-bench-simple
        run: |
          cargo run --package synddb-benchmark --release -- init --db bench-current-simple.db
          if ! cargo run --package synddb-benchmark --release -- run --db bench-current-simple.db --clean --rate 0 --simple --batch-size 5000 > bench-current-simple.log 2>&1; then
            echo "❌ Simple benchmark failed! Output:"
            cat bench-current-simple.log
            exit 1
          fi

          # Extract peak achieved and sustained stable rates
          PEAK_RATE=$(grep "Peak achieved rate:" bench-current-simple.log | tail -1 | sed -E 's/.*Peak achieved rate: ([0-9]+).*/\1/')
          SUSTAINED_RATE=$(grep "Sustained stable rate:" bench-current-simple.log | tail -1 | sed -E 's/.*Sustained stable rate: ([0-9]+).*/\1/')
          echo "peak_rate=$PEAK_RATE" >> $GITHUB_OUTPUT
          echo "sustained_rate=$SUSTAINED_RATE" >> $GITHUB_OUTPUT
          echo "Current simple - Peak: $PEAK_RATE ops/sec, Sustained: $SUSTAINED_RATE ops/sec"

      - name: Run benchmarks on current commit (full)
        id: current-bench-full
        run: |
          cargo run --package synddb-benchmark --release -- init --db bench-current-full.db
          if ! cargo run --package synddb-benchmark --release -- run --db bench-current-full.db --clean --rate 0 --batch-size 1000 > bench-current-full.log 2>&1; then
            echo "❌ Full benchmark failed! Output:"
            cat bench-current-full.log
            exit 1
          fi

          # Extract peak achieved and sustained stable rates
          PEAK_RATE=$(grep "Peak achieved rate:" bench-current-full.log | tail -1 | sed -E 's/.*Peak achieved rate: ([0-9]+).*/\1/')
          SUSTAINED_RATE=$(grep "Sustained stable rate:" bench-current-full.log | tail -1 | sed -E 's/.*Sustained stable rate: ([0-9]+).*/\1/')
          echo "peak_rate=$PEAK_RATE" >> $GITHUB_OUTPUT
          echo "sustained_rate=$SUSTAINED_RATE" >> $GITHUB_OUTPUT
          echo "Current full - Peak: $PEAK_RATE ops/sec, Sustained: $SUSTAINED_RATE ops/sec"

      - name: Run baseline benchmarks
        if: steps.cache-baseline.outputs.cache-hit != 'true'
        run: |
          set +e

          # Checkout baseline commit
          BASELINE_SHA=${{ steps.baseline-sha.outputs.sha }}
          git fetch origin
          git checkout $BASELINE_SHA
          cargo build --package synddb-benchmark --release

          # Run simple benchmark
          cargo run --package synddb-benchmark --release -- init --db bench-baseline-simple.db
          cargo run --package synddb-benchmark --release -- run --db bench-baseline-simple.db --clean --rate 0 --simple --batch-size 5000 > bench-baseline-simple.log 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ Baseline simple benchmark failed! Output:"
            cat bench-baseline-simple.log
            exit 1
          fi

          # Run full benchmark
          cargo run --package synddb-benchmark --release -- init --db bench-baseline-full.db
          cargo run --package synddb-benchmark --release -- run --db bench-baseline-full.db --clean --rate 0 --batch-size 1000 > bench-baseline-full.log 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ Baseline full benchmark failed! Output:"
            cat bench-baseline-full.log
            exit 1
          fi

          git checkout -

      - name: Extract baseline rates
        id: baseline-rates
        run: |
          # Extract from logs (either cached or freshly generated)
          if [ "${{ steps.cache-baseline.outputs.cache-hit }}" == "true" ]; then
            echo "📦 Using cached baseline"
          else
            echo "🆕 Using fresh baseline"
          fi

          # Extract peak and sustained rates for simple mode
          BASELINE_SIMPLE_PEAK=$(grep "Peak achieved rate:" bench-baseline-simple.log | tail -1 | sed -E 's/.*Peak achieved rate: ([0-9]+).*/\1/')
          BASELINE_SIMPLE_SUSTAINED=$(grep "Sustained stable rate:" bench-baseline-simple.log | tail -1 | sed -E 's/.*Sustained stable rate: ([0-9]+).*/\1/')

          # Extract peak and sustained rates for full mode
          BASELINE_FULL_PEAK=$(grep "Peak achieved rate:" bench-baseline-full.log | tail -1 | sed -E 's/.*Peak achieved rate: ([0-9]+).*/\1/')
          BASELINE_FULL_SUSTAINED=$(grep "Sustained stable rate:" bench-baseline-full.log | tail -1 | sed -E 's/.*Sustained stable rate: ([0-9]+).*/\1/')

          echo "simple_peak=$BASELINE_SIMPLE_PEAK" >> $GITHUB_OUTPUT
          echo "simple_sustained=$BASELINE_SIMPLE_SUSTAINED" >> $GITHUB_OUTPUT
          echo "full_peak=$BASELINE_FULL_PEAK" >> $GITHUB_OUTPUT
          echo "full_sustained=$BASELINE_FULL_SUSTAINED" >> $GITHUB_OUTPUT

          echo "Baseline simple - Peak: $BASELINE_SIMPLE_PEAK ops/sec, Sustained: $BASELINE_SIMPLE_SUSTAINED ops/sec"
          echo "Baseline full - Peak: $BASELINE_FULL_PEAK ops/sec, Sustained: $BASELINE_FULL_SUSTAINED ops/sec"

      - name: Compare performance and check for regressions
        run: |
          # Get baseline rates
          BASELINE_SIMPLE_PEAK=${{ steps.baseline-rates.outputs.simple_peak }}
          BASELINE_SIMPLE_SUSTAINED=${{ steps.baseline-rates.outputs.simple_sustained }}
          BASELINE_FULL_PEAK=${{ steps.baseline-rates.outputs.full_peak }}
          BASELINE_FULL_SUSTAINED=${{ steps.baseline-rates.outputs.full_sustained }}

          # Get current rates
          CURRENT_SIMPLE_PEAK=${{ steps.current-bench-simple.outputs.peak_rate }}
          CURRENT_SIMPLE_SUSTAINED=${{ steps.current-bench-simple.outputs.sustained_rate }}
          CURRENT_FULL_PEAK=${{ steps.current-bench-full.outputs.peak_rate }}
          CURRENT_FULL_SUSTAINED=${{ steps.current-bench-full.outputs.sustained_rate }}

          # Determine comparison label based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASELINE_LABEL="Baseline (main)"
            CURRENT_LABEL="Current (PR)"
          else
            BASELINE_LABEL="Previous commit"
            CURRENT_LABEL="Current commit"
          fi

          echo "=== Performance Comparison ==="
          echo "Simple mode:"
          echo "  $BASELINE_LABEL - Peak: $BASELINE_SIMPLE_PEAK ops/sec, Sustained: $BASELINE_SIMPLE_SUSTAINED ops/sec"
          echo "  $CURRENT_LABEL - Peak: $CURRENT_SIMPLE_PEAK ops/sec, Sustained: $CURRENT_SIMPLE_SUSTAINED ops/sec"
          echo "Full mode:"
          echo "  $BASELINE_LABEL - Peak: $BASELINE_FULL_PEAK ops/sec, Sustained: $BASELINE_FULL_SUSTAINED ops/sec"
          echo "  $CURRENT_LABEL - Peak: $CURRENT_FULL_PEAK ops/sec, Sustained: $CURRENT_FULL_SUSTAINED ops/sec"

          # Calculate percentage changes (using sustained rates for regression detection)
          CHANGE_SIMPLE=$(echo "scale=2; (($CURRENT_SIMPLE_SUSTAINED - $BASELINE_SIMPLE_SUSTAINED) / $BASELINE_SIMPLE_SUSTAINED) * 100" | bc)
          CHANGE_FULL=$(echo "scale=2; (($CURRENT_FULL_SUSTAINED - $BASELINE_FULL_SUSTAINED) / $BASELINE_FULL_SUSTAINED) * 100" | bc)
          echo "Simple mode sustained change: $CHANGE_SIMPLE%"
          echo "Full mode sustained change: $CHANGE_FULL%"

          # Write summary for GitHub Actions
          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Simple Mode (Insert-Only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | $BASELINE_LABEL | $CURRENT_LABEL | Change |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Peak achieved | $BASELINE_SIMPLE_PEAK ops/sec | $CURRENT_SIMPLE_PEAK ops/sec | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Sustained stable | $BASELINE_SIMPLE_SUSTAINED ops/sec | $CURRENT_SIMPLE_SUSTAINED ops/sec | $CHANGE_SIMPLE% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Full Mode (Mixed Operations)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | $BASELINE_LABEL | $CURRENT_LABEL | Change |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Peak achieved | $BASELINE_FULL_PEAK ops/sec | $CURRENT_FULL_PEAK ops/sec | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Sustained stable | $BASELINE_FULL_SUSTAINED ops/sec | $CURRENT_FULL_SUSTAINED ops/sec | $CHANGE_FULL% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for regression > 20% in either mode (based on sustained rates)
          REGRESSION_THRESHOLD=-20
          IS_REGRESSION_SIMPLE=$(echo "$CHANGE_SIMPLE < $REGRESSION_THRESHOLD" | bc)
          IS_REGRESSION_FULL=$(echo "$CHANGE_FULL < $REGRESSION_THRESHOLD" | bc)

          if [ "$IS_REGRESSION_SIMPLE" -eq 1 ] || [ "$IS_REGRESSION_FULL" -eq 1 ]; then
            echo "❌ PERFORMANCE REGRESSION DETECTED!"
            if [ "$IS_REGRESSION_SIMPLE" -eq 1 ]; then
              echo "Simple mode: ${CHANGE_SIMPLE}% (exceeds ${REGRESSION_THRESHOLD}% threshold)"
            fi
            if [ "$IS_REGRESSION_FULL" -eq 1 ]; then
              echo "Full mode: ${CHANGE_FULL}% (exceeds ${REGRESSION_THRESHOLD}% threshold)"
            fi
            echo "### ❌ Performance Regression Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$IS_REGRESSION_SIMPLE" -eq 1 ]; then
              echo "**Simple mode** sustained rate decreased by **${CHANGE_SIMPLE}%** (threshold: ${REGRESSION_THRESHOLD}%)" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$IS_REGRESSION_FULL" -eq 1 ]; then
              echo "**Full mode** sustained rate decreased by **${CHANGE_FULL}%** (threshold: ${REGRESSION_THRESHOLD}%)" >> $GITHUB_STEP_SUMMARY
            fi
            exit 1
          elif [ $(echo "$CHANGE_SIMPLE < 0" | bc) -eq 1 ] || [ $(echo "$CHANGE_FULL < 0" | bc) -eq 1 ]; then
            echo "⚠️  Minor performance decrease detected"
            echo "This is within acceptable range (< ${REGRESSION_THRESHOLD}%)."
            echo "### ⚠️ Minor Performance Decrease" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Changes are within acceptable range." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Performance improved or neutral!"
            echo "### ✅ Performance Improvement" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Both benchmarks show improvement or neutral performance!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-current-*.log
            bench-current-*.db
            bench-baseline-*.log
            bench-baseline-*.db
