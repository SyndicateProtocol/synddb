name: RISC Zero CI

# Tests RISC Zero proof-service compilation and guest program execution.
# Runs on PRs that modify proof-service or guest program code.
# Production image ID is generated by gcp-artifact-registry.yml on merge to main.

on:
  pull_request:
    paths:
      # Proof service (host program)
      - "crates/proof-service/**"
      # Guest program
      - "crates/synddb-bootstrap/risc0/program/**"
      # Guest program dependency
      - "crates/gcp-attestation/**"
      - ".github/workflows/risc0-ci.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  risc0-build:
    name: RISC Zero Build & Execute
    runs-on: shared-large-02
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/proof-service

      - name: Install RISC Zero toolchain
        run: |
          set -e
          RISC0_INSTALLED=false
          # Version must match risc0-zkvm crate version in Cargo.toml
          # Note: risc0-groth16 uses different versioning, so we install it without a version
          RISC0_VERSION="3.0.4"
          for i in {1..3}; do
            echo "Attempt $i to install RISC Zero toolchain v${RISC0_VERSION}..."
            if curl -L https://risczero.com/install | bash && \
               ~/.risc0/bin/rzup install rust && \
               ~/.risc0/bin/rzup install r0vm ${RISC0_VERSION} && \
               ~/.risc0/bin/rzup install cargo-risczero ${RISC0_VERSION} && \
               ~/.risc0/bin/rzup install risc0-groth16; then
              # Add rzup bin directory to PATH for subsequent steps
              echo "$HOME/.risc0/bin" >> $GITHUB_PATH
              # Add toolchain bin directories explicitly
              # These provide rustc for riscv32im-risc0-zkvm-elf target
              echo "$HOME/.risc0/toolchains/rust/bin" >> $GITHUB_PATH
              echo "$HOME/.risc0/toolchains/r0vm/bin" >> $GITHUB_PATH
              echo "$HOME/.risc0/toolchains/cargo-risczero/bin" >> $GITHUB_PATH
              # Export CC to use system compiler explicitly (avoid RISC Zero's bundled cpp)
              echo "CC=/usr/bin/cc" >> $GITHUB_ENV
              # Debug: list installed toolchains
              echo "Installed RISC Zero toolchains:"
              ls -la ~/.risc0/toolchains/ || true
              # Verify installation using absolute paths
              if ~/.risc0/bin/rzup --version; then
                RISC0_INSTALLED=true
                break
              fi
            fi
            echo "Attempt $i failed. Retrying in 5 seconds..."
            sleep 5
          done
          if [ "$RISC0_INSTALLED" = false ]; then
            echo "::error::Failed to install RISC Zero toolchain after 3 attempts"
            exit 1
          fi

      - name: Run proof-service tests
        # Tests compile the guest program via risc0-build::embed_methods() and
        # execute it in fast mode (no proof generation) against sample attestations.
        run: |
          cd crates/proof-service
          cargo test --release
          echo "::notice::Proof service tests passed"
