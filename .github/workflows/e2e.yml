name: E2E Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/**"
      - "docker/**"
      - "tests/e2e/**"
      - "tests/e2e-gcs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/e2e.yml"

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Local Publisher
            package: synddb-e2e
            test: e2e
            compose: tests/e2e/docker-compose.yml
          - name: GCS Publisher
            package: synddb-e2e-gcs
            test: e2e_gcs
            compose: tests/e2e-gcs/docker-compose.yml

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E test
        run: cargo test -p ${{ matrix.package }} --test ${{ matrix.test }} -- --nocapture

      - name: Show logs on failure
        if: failure()
        run: docker compose -f ${{ matrix.compose }} logs

      - name: Cleanup
        if: always()
        run: docker compose -f ${{ matrix.compose }} down --volumes --remove-orphans || true
