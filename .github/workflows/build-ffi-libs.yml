name: Build FFI Libraries

# This workflow handles FFI library builds for three scenarios:
# 1. Pull Requests: Build dev platforms (dry run, no commits) - verify builds work
# 2. Main branch: Build dev platforms and commit to repo - enable cross-language dev
# 3. Release tags: Build all platforms and create GitHub Release - production distribution
#
# BRANCH PROTECTION NOTE:
# If you have branch protection rules requiring PRs for the main branch, the
# commit-dev-libs job will fail with an error like:
#
#   remote: error: GH013: Repository rule violations found for refs/heads/main.
#   remote: - Changes must be made through a pull request.
#   ! [remote rejected] main -> main (push declined due to repository rule violations)
#
# To fix this, set up a deploy key with bypass permissions:
#
#   1. Generate an SSH key pair:
#      ssh-keygen -t ed25519 -C "ffi-deploy-key" -f ffi-deploy-key -N ""
#
#   2. Add the PUBLIC key as a Deploy Key with write access:
#      - Go to repository Settings → Deploy keys → Add deploy key
#      - Title: "FFI Library Auto-commit"
#      - Paste contents of ffi-deploy-key.pub
#      - Check "Allow write access"
#
#   3. Add the PRIVATE key as a repository secret:
#      - Go to repository Settings → Secrets and variables → Actions
#      - Create new repository secret named FFI_DEPLOY_KEY
#      - Paste contents of ffi-deploy-key (private key)
#
#   4. Add "Deploy keys" to the ruleset bypass list:
#      - Go to repository Settings → Rules → Rulesets
#      - Edit the ruleset protecting the main branch
#      - Under "Bypass list", click "Add bypass"
#      - Select "Deploy keys"
#
#   5. Delete the local key files (secrets are now stored in GitHub):
#      rm ffi-deploy-key ffi-deploy-key.pub

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    # NOTE: paths filter only applies to branch pushes, not tags.
    # Tag pushes (releases) always run regardless of paths - this is intentional.
    paths:
      - 'crates/synddb-client/**'
      - '!crates/synddb-client/libs/**'  # Exclude libs to prevent infinite loop (this workflow commits to libs/)
      - 'crates/synddb-chain-monitor/**'  # dependency of synddb-client
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/build-ffi-libs.yml'

  pull_request:
    paths:
      - 'crates/synddb-client/**'
      - '!crates/synddb-client/libs/**'  # Exclude libs to prevent infinite loop (this workflow commits to libs/)
      - 'crates/synddb-chain-monitor/**'  # dependency of synddb-client
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/build-ffi-libs.yml'

  workflow_dispatch:
    inputs:
      platforms:
        description: 'Which platforms to build'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev            # Linux x64, macOS ARM64
          - all-platforms  # Also macOS x64, Windows (for testing)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  # Don't cancel in-progress runs - this workflow commits to the repo and
  # cancellation could leave libraries out of sync with source code
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Expensive runners (macOS Intel, Windows) only provision for releases.
  check-platforms:
    name: Check Build Requirements
    runs-on: ubuntu-latest
    outputs:
      build_release: ${{ steps.check.outputs.build_release }}
    steps:
      - name: Determine platforms to build
        id: check
        run: |
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/v') }}"
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          MANUAL_PLATFORMS="${{ inputs.platforms }}"

          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Manual platforms: $MANUAL_PLATFORMS"

          # Determine if release platforms (macOS Intel, Windows) should build
          if [ "$IS_TAG" = "true" ]; then
            echo "build_release=true" >> $GITHUB_OUTPUT
            echo "Release tag detected - will build ALL platforms"
          elif [ "$IS_MANUAL" = "true" ] && [ "$MANUAL_PLATFORMS" = "all-platforms" ]; then
            echo "build_release=true" >> $GITHUB_OUTPUT
            echo "Manual all-platforms requested - will build ALL platforms"
          else
            echo "build_release=false" >> $GITHUB_OUTPUT
            echo "Not a release - will only build dev platforms (Linux, macOS ARM)"
          fi

  # Dev platforms: Linux x64, macOS ARM64 (always build)
  build-dev-libs:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    needs: check-platforms
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            arch: x64
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libsynddb_client.so
            lib_dir: linux-x64

          - platform: darwin
            os: macos-14
            arch: arm64
            rust_target: aarch64-apple-darwin
            lib_name: libsynddb_client.dylib
            lib_dir: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-ffi

      - name: Build FFI library
        run: |
          cargo build \
            --package synddb-client \
            --features ffi \
            --release \
            --target ${{ matrix.rust_target }}

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/${{ matrix.lib_dir }}
          cp target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} \
             artifacts/${{ matrix.lib_dir }}/
          ls -lh artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          file artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffi-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 7 }}

  # Release platforms: macOS x64, Windows (only for releases or manual all-platforms)
  build-release-libs:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    needs: check-platforms
    if: needs.check-platforms.outputs.build_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            os: macos-15-intel
            arch: x64
            rust_target: x86_64-apple-darwin
            lib_name: libsynddb_client.dylib
            lib_dir: darwin-x64

          - platform: win32
            os: windows-latest
            arch: x64
            rust_target: x86_64-pc-windows-msvc
            lib_name: synddb_client.dll
            lib_dir: win-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-ffi

      - name: Build FFI library
        run: |
          cargo build \
            --package synddb-client \
            --features ffi \
            --release \
            --target ${{ matrix.rust_target }}

      - name: Prepare artifacts (Unix)
        if: matrix.platform != 'win32'
        run: |
          mkdir -p artifacts/${{ matrix.lib_dir }}
          cp target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} \
             artifacts/${{ matrix.lib_dir }}/
          ls -lh artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          file artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}

      - name: Prepare artifacts (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/${{ matrix.lib_dir }}
          Copy-Item target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} `
                    artifacts/${{ matrix.lib_dir }}/
          Get-ChildItem artifacts/${{ matrix.lib_dir }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffi-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 7 }}

  commit-dev-libs:
    name: Commit Dev Libraries
    needs: build-dev-libs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.FFI_DEPLOY_KEY }}

      - name: Download dev library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'ffi-lib-*'
          path: artifacts

      - name: Organize dev libraries
        run: |
          # Create libs directory structure
          mkdir -p crates/synddb-client/libs/linux-x64
          mkdir -p crates/synddb-client/libs/darwin-arm64

          # Copy libraries from artifacts
          find artifacts -name "*.so" -exec cp {} crates/synddb-client/libs/linux-x64/ \;
          find artifacts -name "*.dylib" -path "*/darwin-arm64/*" -exec cp {} crates/synddb-client/libs/darwin-arm64/ \;

          # List what we have
          echo "Dev libraries prepared:"
          find crates/synddb-client/libs -type f -ls

      - name: Check for changes
        id: check_changes
        run: |
          git add crates/synddb-client/libs/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No library changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Library changes detected:"
            git diff --staged --stat
          fi

      - name: Commit and push libraries
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Capture file list before commit (must be done while files are staged)
          UPDATED_FILES=$(git diff --staged --name-only | sed 's/^/- /')

          git commit -m "chore: Update FFI libraries [skip ci]" \
            -m "Built from: ${{ github.sha }}" \
            -m "Updated:" \
            -m "$UPDATED_FILES"

          git push

  create-release:
    name: Create GitHub Release
    needs: [build-dev-libs, build-release-libs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'ffi-lib-*'
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p release

          # Rename libraries with platform/arch suffix for clarity
          find artifacts -name "libsynddb_client.so" -path "*/linux-x64/*" -exec cp {} release/synddb_client-linux-x64.so \;
          find artifacts -name "*.dylib" -path "*/darwin-arm64/*" -exec cp {} release/synddb_client-darwin-arm64.dylib \;
          find artifacts -name "*.dylib" -path "*/darwin-x64/*" -exec cp {} release/synddb_client-darwin-x64.dylib \;
          find artifacts -name "*.dll" -path "*/win-x64/*" -exec cp {} release/synddb_client-win-x64.dll \;

          # Copy header file
          cp crates/synddb-client/bindings/synddb.h release/

          # Show what we have
          echo "Release files:"
          ls -lh release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          echo "Checksums:"
          cat SHA256SUMS

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## SyndDB Client FFI Libraries

          Pre-built C FFI libraries for cross-language integration with SyndDB.

          ### Supported Platforms

          - **Linux x86_64**: `synddb_client-linux-x64.so`
          - **macOS x86_64**: `synddb_client-darwin-x64.dylib` (Intel Macs)
          - **macOS ARM64**: `synddb_client-darwin-arm64.dylib` (M1/M2/M3 Macs)
          - **Windows x86_64**: `synddb_client-win-x64.dll`

          ### Quick Start

          1. Download the library for your platform
          2. Place it in your project directory
          3. Include the `synddb.h` header file (included in release)

          ### Language Bindings

          Ready-to-use bindings available in the repository:

          - **Python** (ctypes): `crates/synddb-client/bindings/python/`
          - **Node.js** (ffi-napi): `crates/synddb-client/bindings/nodejs/`
          - **Go** (cgo): `crates/synddb-client/bindings/go/`
          - **C/C++**: Direct usage with header file

          ### Examples

          Complete examples in `crates/synddb-client/examples/ffi/`:

          ```bash
          # Python
          python3 examples/ffi/test.py

          # Node.js
          node examples/ffi/test_koffi.js

          # C
          clang -o test test.c -L. -lsynddb_client
          ./test
          ```

          ### Verification

          Verify downloads using SHA256 checksums:

          ```bash
          sha256sum -c SHA256SUMS
          ```

          ### Documentation

          - [Client README](https://github.com/SyndicateProtocol/SyndDB/tree/main/crates/synddb-client)
          - [FFI Examples](https://github.com/SyndicateProtocol/SyndDB/tree/main/crates/synddb-client/examples/ffi)
          - [API Documentation](https://docs.rs/synddb-client)

          ### Building from Source

          ```bash
          cargo build --package synddb-client --features ffi --release
          ```

          Library will be at: `target/release/libsynddb_client.{so,dylib,dll}`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: false

  publish-crates:
    name: Publish to crates.io
    needs: [build-dev-libs, build-release-libs]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish synddb-client to crates.io
        run: cargo publish --package synddb-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
