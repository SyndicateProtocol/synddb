name: Build FFI Libraries

# This workflow handles FFI library builds for three scenarios:
# 1. Pull Requests: Build dev platforms (dry run, no commits) - verify builds work
# 2. Main branch: Build dev platforms and commit to repo - enable cross-language dev
# 3. Release tags: Build all platforms and create GitHub Release - production distribution

on:
  # Main branch commits and release tags
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

  # PRs: Build and test (dry run, no commits)
  pull_request:
    paths:
      - 'crates/synddb-client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-ffi-libs.yml'

  # Manual trigger for testing (dry run only, no commits/releases)
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-libs:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (always build)
          - platform: linux
            os: ubuntu-latest
            arch: x64
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libsynddb_client.so
            lib_dir: linux-x64
            build_for: both

          # macOS ARM64 (always build - common for dev)
          - platform: darwin
            os: macos-14
            arch: arm64
            rust_target: aarch64-apple-darwin
            lib_name: libsynddb_client.dylib
            lib_dir: darwin-arm64
            build_for: both

          # macOS x86_64 (releases only)
          - platform: darwin
            os: macos-13
            arch: x64
            rust_target: x86_64-apple-darwin
            lib_name: libsynddb_client.dylib
            lib_dir: darwin-x64
            build_for: release

          # Windows x86_64 (releases only)
          - platform: win32
            os: windows-latest
            arch: x64
            rust_target: x86_64-pc-windows-msvc
            lib_name: synddb_client.dll
            lib_dir: win-x64
            build_for: release

    steps:
      - name: Check if should build
        id: should_build
        run: |
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/v') }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          MANUAL_SCENARIO="${{ inputs.scenario }}"
          BUILD_FOR="${{ matrix.build_for }}"

          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Platform build_for: $BUILD_FOR"
          echo "Manual scenario: $MANUAL_SCENARIO"

          # Handle manual triggers
          if [ "$IS_MANUAL" = "true" ]; then
            if [ "$MANUAL_SCENARIO" = "release" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "✓ Building for MANUAL RELEASE TEST (all platforms)"
            elif [ "$BUILD_FOR" = "both" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "✓ Building for MANUAL $MANUAL_SCENARIO TEST"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "⊘ Skipping (manual $MANUAL_SCENARIO - release-only platform)"
            fi
          # Handle automatic triggers
          elif [ "$IS_TAG" = "true" ]; then
            # Release tags: Build all platforms
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✓ Building for RELEASE (all platforms)"
          elif [ "$BUILD_FOR" = "both" ]; then
            # PRs and main: Only build dev platforms (Linux, macOS ARM)
            echo "should_build=true" >> $GITHUB_OUTPUT
            if [ "$IS_PR" = "true" ]; then
              echo "✓ Building for PR (dry run)"
            else
              echo "✓ Building for DEV (will commit)"
            fi
          else
            # Skip release-only platforms on PRs and main
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "⊘ Skipping (release-only platform)"
          fi
        shell: bash

      - name: Checkout code
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: steps.should_build.outputs.should_build == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo dependencies
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build FFI library
        if: steps.should_build.outputs.should_build == 'true'
        run: |
          cargo build \
            --package synddb-client \
            --features ffi \
            --release \
            --target ${{ matrix.rust_target }}

      - name: Prepare artifacts (Unix)
        if: steps.should_build.outputs.should_build == 'true' && matrix.platform != 'win32'
        run: |
          mkdir -p artifacts/${{ matrix.lib_dir }}
          cp target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} \
             artifacts/${{ matrix.lib_dir }}/
          ls -lh artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          file artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}

      - name: Prepare artifacts (Windows)
        if: steps.should_build.outputs.should_build == 'true' && matrix.platform == 'win32'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/${{ matrix.lib_dir }}
          Copy-Item target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} `
                    artifacts/${{ matrix.lib_dir }}/
          Get-ChildItem artifacts/${{ matrix.lib_dir }}

      - name: Upload artifact
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ffi-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.lib_dir }}/${{ matrix.lib_name }}
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 7 }}

  commit-dev-libs:
    name: Commit Dev Libraries
    needs: build-libs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dev library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ffi-lib-*'
          path: artifacts

      - name: Organize dev libraries
        run: |
          # Create libs directory structure
          mkdir -p crates/synddb-client/libs/linux-x64
          mkdir -p crates/synddb-client/libs/darwin-arm64

          # Copy libraries from artifacts
          find artifacts -name "*.so" -exec cp {} crates/synddb-client/libs/linux-x64/ \;
          find artifacts -name "*.dylib" -path "*/darwin-arm64/*" -exec cp {} crates/synddb-client/libs/darwin-arm64/ \;

          # List what we have
          echo "Dev libraries prepared:"
          find crates/synddb-client/libs -type f -ls

      - name: Check for changes
        id: check_changes
        run: |
          git add crates/synddb-client/libs/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No library changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Library changes detected:"
            git diff --staged --stat
          fi

      - name: Commit and push libraries
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate commit message with updated file list
          UPDATED_FILES=$(git diff --staged --name-only | sed 's/^/- /')

          git commit -m "chore: Update FFI libraries [skip ci]

          Built from commit ${{ github.sha }}

          Updated libraries:
          ${UPDATED_FILES}"

          git push origin main

  create-release:
    name: Create GitHub Release
    needs: build-libs
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'ffi-lib-*'
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p release

          # Rename libraries with platform/arch suffix for clarity
          find artifacts -name "libsynddb_client.so" -path "*/linux-x64/*" -exec cp {} release/synddb_client-linux-x64.so \;
          find artifacts -name "*.dylib" -path "*/darwin-arm64/*" -exec cp {} release/synddb_client-darwin-arm64.dylib \;
          find artifacts -name "*.dylib" -path "*/darwin-x64/*" -exec cp {} release/synddb_client-darwin-x64.dylib \;
          find artifacts -name "*.dll" -path "*/win-x64/*" -exec cp {} release/synddb_client-win-x64.dll \;

          # Copy header file
          cp crates/synddb-client/bindings/synddb.h release/

          # Show what we have
          echo "Release files:"
          ls -lh release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          echo "Checksums:"
          cat SHA256SUMS

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## SyndDB Client FFI Libraries

          Pre-built C FFI libraries for cross-language integration with SyndDB.

          ### Supported Platforms

          - **Linux x86_64**: `synddb_client-linux-x64.so`
          - **macOS x86_64**: `synddb_client-darwin-x64.dylib` (Intel Macs)
          - **macOS ARM64**: `synddb_client-darwin-arm64.dylib` (M1/M2/M3 Macs)
          - **Windows x86_64**: `synddb_client-win-x64.dll`

          ### Quick Start

          1. Download the library for your platform
          2. Place it in your project directory
          3. Include the `synddb.h` header file (included in release)

          ### Language Bindings

          Ready-to-use bindings available in the repository:

          - **Python** (ctypes): `crates/synddb-client/bindings/python/`
          - **Node.js** (ffi-napi): `crates/synddb-client/bindings/nodejs/`
          - **Go** (cgo): `crates/synddb-client/bindings/go/`
          - **C/C++**: Direct usage with header file

          ### Examples

          Complete examples in `crates/synddb-client/examples/ffi/`:

          ```bash
          # Python
          python3 examples/ffi/test.py

          # Node.js
          node examples/ffi/test_koffi.js

          # C
          clang -o test test.c -L. -lsynddb_client
          ./test
          ```

          ### Verification

          Verify downloads using SHA256 checksums:

          ```bash
          sha256sum -c SHA256SUMS
          ```

          ### Documentation

          - [Client README](https://github.com/Syndicate/SyndDB/tree/main/crates/synddb-client)
          - [FFI Examples](https://github.com/Syndicate/SyndDB/tree/main/crates/synddb-client/examples/ffi)
          - [API Documentation](https://docs.rs/synddb-client)

          ### Building from Source

          ```bash
          cargo build --package synddb-client --features ffi --release
          ```

          Library will be at: `target/release/libsynddb_client.{so,dylib,dll}`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: false

  publish-crates:
    name: Publish to crates.io
    needs: build-libs
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish synddb-client to crates.io
        run: |
          cargo publish --package synddb-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
        continue-on-error: true
