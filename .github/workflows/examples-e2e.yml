name: Examples E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/examples-e2e.yml"

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  example-e2e:
    name: ${{ matrix.name }} E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Prediction Market
            dir: prediction-market
          - name: Price Oracle
            dir: price-oracle
    defaults:
      run:
        working-directory: examples/${{ matrix.dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker compose up -d --build --wait
        timeout-minutes: 35

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for sequencer to be healthy..."
          for i in {1..60}; do
            if curl -sf http://localhost:8433/health > /dev/null 2>&1; then
              echo "Sequencer is healthy"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

      - name: Run E2E tests
        run: ./e2e-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  price-oracle-unit-tests:
    name: Price Oracle Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: examples/price-oracle

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: python -m pytest app/tests/ -v --tb=short
        env:
          # Run from price-oracle dir to avoid app/http.py shadowing stdlib http
          PYTHONPATH: ${{ github.workspace }}/examples/price-oracle
