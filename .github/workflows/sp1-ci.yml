name: SP1 CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/synddb-bootstrap/sp1/**"
      - "crates/gcp-attestation/**"
      - "tests/confidential-space/sp1/**"
      - ".github/workflows/sp1-ci.yml"

  push:
    branches:
      - main
    paths:
      - "crates/synddb-bootstrap/sp1/**"
      - "crates/gcp-attestation/**"
      - "tests/confidential-space/sp1/**"

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  sp1-build:
    if: github.event.pull_request.draft == false || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: SP1 Build & Execute
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83.0"

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/synddb-bootstrap/sp1/program
            tests/confidential-space/sp1/script

      - name: Install SP1 toolchain
        run: |
          set -e
          for i in {1..3}; do
            echo "Attempt $i to install SP1 toolchain..."
            {
              curl -L https://sp1up.succinct.xyz | bash &&
              ~/.sp1/bin/sp1up &&
              ~/.sp1/bin/cargo-prove prove --version
            } && break || {
              echo "Attempt $i failed. Retrying in 5 seconds..."
              sleep 5
            }
          done

      - name: Build SP1 program
        run: |
          cd crates/synddb-bootstrap/sp1/program
          ~/.sp1/bin/cargo-prove prove build

      - name: Build SP1 script
        run: |
          cd tests/confidential-space/sp1/script
          cargo build --release

      - name: Run SP1 execute (test mode)
        run: |
          cd tests/confidential-space/sp1/script
          cargo run --release --bin gcp-cs-prover -- --execute --sample ../../samples/samples_*.json

      - name: Generate verification key
        run: |
          cd tests/confidential-space/sp1/script
          cargo run --release --bin gcp-cs-vkey
