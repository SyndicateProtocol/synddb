name: SP1 CI

on:
  # PR-only: provides feedback before merge. Push to main is handled by artifact-registry.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/synddb-bootstrap/sp1/**"
      - "crates/gcp-attestation/**"
      - "tests/confidential-space/sp1/**"
      - ".github/workflows/sp1-ci.yml"

  # Allow manual trigger for debugging
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  sp1-build:
    if: github.event.pull_request.draft == false || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: SP1 Build & Execute
    runs-on: shared-large-02
    timeout-minutes: 60
    outputs:
      vkey: ${{ steps.vkey.outputs.vkey }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/synddb-bootstrap/sp1/program
            tests/confidential-space/sp1/script
            services/proof-service

      - name: Install SP1 toolchain
        run: |
          set -e
          SP1_INSTALLED=false
          for i in {1..3}; do
            echo "Attempt $i to install SP1 toolchain..."
            if curl -L https://sp1up.succinct.xyz | bash && \
               ~/.sp1/bin/sp1up && \
               ~/.sp1/bin/cargo-prove prove --version; then
              SP1_INSTALLED=true
              break
            else
              echo "Attempt $i failed. Retrying in 5 seconds..."
              sleep 5
            fi
          done
          if [ "$SP1_INSTALLED" = false ]; then
            echo "::error::Failed to install SP1 toolchain after 3 attempts"
            exit 1
          fi

      - name: Build SP1 program
        run: |
          cd crates/synddb-bootstrap/sp1/program
          ~/.sp1/bin/cargo-prove prove build

      - name: Build SP1 script
        run: |
          cd tests/confidential-space/sp1/script
          cargo build --release

      - name: Run SP1 execute (test mode)
        run: |
          cd tests/confidential-space/sp1/script
          cargo run --release --bin gcp-cs-prover -- --execute --sample ../../samples/samples_*.json

      - name: Generate verification key
        id: vkey
        run: |
          cd services/proof-service
          VKEY=$(cargo run --release --bin sp1-vkey 2>/dev/null | grep "bytes32" | awk '{print $NF}')

          # Validate vkey format (should be 0x followed by 64 hex chars)
          if [[ ! "$VKEY" =~ ^0x[a-fA-F0-9]{64}$ ]]; then
            echo "::error::Invalid vkey format: $VKEY"
            exit 1
          fi

          echo "vkey=$VKEY" >> "$GITHUB_OUTPUT"
          echo "::notice::SP1 Verification Key: $VKEY"

          {
            echo "## SP1 Verification Key"
            echo ""
            echo "Use this value for \`ATTESTATION_VERIFIER_VKEY\` in contract deployment:"
            echo ""
            echo "\`\`\`"
            echo "$VKEY"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
