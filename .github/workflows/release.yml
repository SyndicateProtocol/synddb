# Cargo Release Workflow
#
# This workflow is currently DISABLED (no automatic triggers).
# To enable, uncomment the `push: tags:` trigger below.
#
# Manual releases:
#   1. Run `just release patch|minor|major` locally (requires cargo-release)
#   2. Or trigger via GitHub Actions UI with workflow_dispatch
#
# Prerequisites:
#   - CARGO_REGISTRY_TOKEN secret with crates.io API token
#   - Cargo.toml files have `publish = true` for crates to release
#
# Crate publishing order (respects workspace dependencies):
#   1. synddb-shared (no deps)
#   2. synddb-client (depends on shared)
#   3. synddb-sequencer, synddb-validator, etc.

name: Release

on:
  # DISABLED: Uncomment to enable automatic releases on version tags
  # push:
  #   tags:
  #     - "v*.*.*"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        type: boolean
        default: true
      crate:
        description: "Specific crate to release (blank for all)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate the release before publishing
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Check semver compatibility
        run: cargo semver-checks check-release
        continue-on-error: true  # Don't fail on first release

      - name: Verify crate versions match
        run: |
          echo "Checking version consistency across workspace..."
          # Extract versions from all publishable Cargo.toml files
          for crate in synddb-shared synddb-client synddb-sequencer synddb-validator; do
            if [ -f "crates/$crate/Cargo.toml" ]; then
              version=$(grep '^version' "crates/$crate/Cargo.toml" | head -1 | cut -d'"' -f2)
              echo "$crate: $version"
            fi
          done

      - name: Run full test suite
        run: cargo test --workspace --all-features

      - name: Build release binaries
        run: cargo build --workspace --release

  # Generate changelog from conventional commits
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true  # Don't fail if cliff.toml doesn't exist

      - name: Show changelog
        run: |
          echo "Generated changelog:"
          echo "${{ steps.changelog.outputs.changelog }}"

  # Publish crates to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate, changelog]
    if: ${{ !inputs.dry_run }}
    environment: crates-io  # Requires environment approval
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Publish in dependency order
      - name: Publish synddb-shared
        if: ${{ inputs.crate == '' || inputs.crate == 'synddb-shared' }}
        run: cargo publish -p synddb-shared --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true  # May already be published

      - name: Wait for crates.io index update
        if: ${{ inputs.crate == '' }}
        run: sleep 30

      - name: Publish synddb-client
        if: ${{ inputs.crate == '' || inputs.crate == 'synddb-client' }}
        run: cargo publish -p synddb-client --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      # Add more crates here in dependency order as needed
      # - name: Publish synddb-sequencer
      #   run: cargo publish -p synddb-sequencer --allow-dirty
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create GitHub Release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [changelog, publish]
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ needs.changelog.outputs.changelog }}
          draft: true  # Review before publishing
          prerelease: ${{ contains(inputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dry run summary
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: [validate, changelog]
    if: ${{ inputs.dry_run }}
    steps:
      - name: Summary
        run: |
          echo "## Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Crate: ${{ inputs.crate || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What would happen:" >> $GITHUB_STEP_SUMMARY
          echo "1. Validate semver compatibility" >> $GITHUB_STEP_SUMMARY
          echo "2. Run full test suite" >> $GITHUB_STEP_SUMMARY
          echo "3. Generate changelog from commits" >> $GITHUB_STEP_SUMMARY
          echo "4. Publish crates to crates.io" >> $GITHUB_STEP_SUMMARY
          echo "5. Create GitHub Release (draft)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To actually release, run again with dry_run=false" >> $GITHUB_STEP_SUMMARY
