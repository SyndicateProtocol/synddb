name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native-libs:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - platform: linux
            os: ubuntu-latest
            arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libsynddb_client.so

          # macOS x86_64
          - platform: macos
            os: macos-13
            arch: x86_64
            rust_target: x86_64-apple-darwin
            lib_name: libsynddb_client.dylib

          # macOS ARM64 (M1/M2)
          - platform: macos
            os: macos-14
            arch: arm64
            rust_target: aarch64-apple-darwin
            lib_name: libsynddb_client.dylib

          # Windows x86_64
          - platform: windows
            os: windows-latest
            arch: x86_64
            rust_target: x86_64-pc-windows-msvc
            lib_name: synddb_client.dll

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build release library
        run: |
          cargo build \
            --package synddb-client \
            --features ffi \
            --release \
            --target ${{ matrix.rust_target }}

      - name: Prepare artifact (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} \
             artifacts/synddb_client-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.platform == 'linux' && 'so' || 'dylib' }}
          # Also copy the header file
          cp crates/synddb-client/bindings/synddb.h artifacts/

      - name: Prepare artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }} `
                    artifacts/synddb_client-${{ matrix.platform }}-${{ matrix.arch }}.dll
          # Also copy the header file
          Copy-Item crates/synddb-client/bindings/synddb.h artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: synddb-client-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build-native-libs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release
          # Move all library files to release directory
          find release-artifacts -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) -exec cp {} release/ \;
          # Copy header file (only need one copy)
          find release-artifacts -type f -name "synddb.h" -exec cp {} release/ \; -quit
          ls -lah release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Get version from tag
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Creating release for version: ${GITHUB_REF#refs/tags/}"

      - name: Generate release notes
        id: release_notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## SyndDB Client FFI Libraries

          Pre-built C FFI libraries for cross-language integration with SyndDB.

          ### Supported Platforms

          - **Linux x86_64**: `synddb_client-linux-x86_64.so`
          - **macOS x86_64**: `synddb_client-macos-x86_64.dylib` (Intel Macs)
          - **macOS ARM64**: `synddb_client-macos-arm64.dylib` (M1/M2/M3 Macs)
          - **Windows x86_64**: `synddb_client-windows-x86_64.dll`

          ### Usage

          1. Download the library for your platform
          2. Place it in your project directory or a system library path
          3. Include the `synddb.h` header file (included in release)
          4. Link against the library in your build system

          ### Language Bindings

          Ready-to-use bindings are available in the `crates/synddb-client/bindings/` directory:

          - **Python** (ctypes)
          - **Node.js** (ffi-napi, koffi)
          - **Go** (cgo)
          - **C/C++** (direct usage)

          ### Examples

          See `crates/synddb-client/examples/ffi/` for complete examples:

          - `test.c` - C example
          - `test.py` - Python ctypes example
          - `test_koffi.js` - Node.js example
          - `README.md` - Comprehensive FFI guide

          ### Verification

          Verify downloads using the included `SHA256SUMS` file:

          ```bash
          sha256sum -c SHA256SUMS
          ```

          ### Documentation

          - [Client README](https://github.com/Syndicate/SyndDB/tree/main/crates/synddb-client)
          - [FFI Examples](https://github.com/Syndicate/SyndDB/tree/main/crates/synddb-client/examples/ffi)
          - [Language Bindings](https://github.com/Syndicate/SyndDB/tree/main/crates/synddb-client/bindings)

          ### Building from Source

          If you prefer to build yourself:

          ```bash
          cargo build --package synddb-client --features ffi --release
          ```

          The library will be at `target/release/libsynddb_client.{so,dylib,dll}`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates-io:
    name: Publish to crates.io
    needs: build-native-libs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish synddb-client
        run: |
          cargo publish --package synddb-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true  # Don't fail if already published
