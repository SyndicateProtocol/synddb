name: GCP Artifact Registry

# Build and publish Docker images to Artifact Registry.
#
# This workflow handles two types of images:
# 1. Reproducible TEE images (sequencer, validator) - bit-for-bit reproducible
#    for Confidential Space attestation where image hash must be verifiable
# 2. Standard images (relayer, proof-service) - regular builds without
#    reproducibility requirements
#
# COST OPTIMIZATION:
# Standard images only build when their specific files change. A change detection
# job runs first to determine which images need rebuilding.

on:
  push:
    branches:
      - main
      - example-app
    tags:
      - 'v*'  # Release tags (e.g., v1.0.0)
    paths:
      - "docker/**"
      - "crates/**"
      - "services/**"
      - "examples/price-oracle/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/gcp-artifact-registry.yml"

  # Allow manual triggering for verification before releases
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Detect which standard images need to be built
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      relayer: ${{ steps.filter.outputs.relayer }}
      proof-service: ${{ steps.filter.outputs.proof-service }}
      price-oracle: ${{ steps.filter.outputs.price-oracle }}
      price-oracle-validator: ${{ steps.filter.outputs.price-oracle-validator }}
      any-standard: ${{ steps.filter.outputs.relayer == 'true' || steps.filter.outputs.proof-service == 'true' || steps.filter.outputs.price-oracle == 'true' || steps.filter.outputs.price-oracle-validator == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relayer:
              - 'docker/relayer.Dockerfile'
              - 'crates/synddb-relayer/**'
              - 'crates/synddb-shared/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            proof-service:
              - 'services/proof-service/**'
            price-oracle:
              - 'examples/price-oracle/Dockerfile'
              - 'examples/price-oracle/app/**'
              - 'examples/price-oracle/requirements.txt'
            price-oracle-validator:
              - 'examples/price-oracle/validator.Dockerfile'
              - 'crates/synddb-validator/**'
              - 'crates/synddb-shared/**'
              - 'examples/price-oracle-validator/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

      - name: Summary
        run: |
          echo "## Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Changed | Will Build |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| relayer | ${{ steps.filter.outputs.relayer }} | ${{ steps.filter.outputs.relayer }} |" >> $GITHUB_STEP_SUMMARY
          echo "| proof-service | ${{ steps.filter.outputs.proof-service }} | ${{ steps.filter.outputs.proof-service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| price-oracle | ${{ steps.filter.outputs.price-oracle }} | ${{ steps.filter.outputs.price-oracle }} |" >> $GITHUB_STEP_SUMMARY
          echo "| price-oracle-validator | ${{ steps.filter.outputs.price-oracle-validator }} | ${{ steps.filter.outputs.price-oracle-validator }} |" >> $GITHUB_STEP_SUMMARY

  # Build on multiple runners to verify cross-machine reproducibility
  build:
    name: Reproducible Build (${{ matrix.runner }}, ${{ matrix.image }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04]
        image: [sequencer, validator]

    steps:
      - uses: actions/checkout@v4

      # Read BuildKit version from shared config (single source of truth)
      - name: Get BuildKit version
        id: buildkit
        run: echo "version=$(cat docker/reproducible/buildkit.version)" >> $GITHUB_OUTPUT

      # Pin BuildKit version for reproducibility
      # Latest versions: https://github.com/moby/buildkit/releases
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:${{ steps.buildkit.outputs.version }}

      - name: Build image (attempt 1)
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f docker/reproducible/${{ matrix.image }}.Dockerfile \
            -t ${{ matrix.image }}:build1 \
            .

      - name: Build image (attempt 2)
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f docker/reproducible/${{ matrix.image }}.Dockerfile \
            -t ${{ matrix.image }}:build2 \
            .

      - name: Verify same-machine reproducibility
        run: |
          HASH1=$(docker inspect ${{ matrix.image }}:build1 --format='{{.Id}}')
          HASH2=$(docker inspect ${{ matrix.image }}:build2 --format='{{.Id}}')

          echo "Build 1: $HASH1"
          echo "Build 2: $HASH2"

          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::Same-machine reproducibility failed!"
            echo "Two builds on the same machine produced different hashes."
            exit 1
          fi

          echo "::notice::Same-machine reproducibility verified for ${{ matrix.image }} on ${{ matrix.runner }}"

      - name: Save image hash
        run: |
          mkdir -p hashes
          docker inspect ${{ matrix.image }}:build1 --format='{{.Id}}' > hashes/${{ matrix.image }}-${{ matrix.runner }}.txt
          echo "Hash: $(cat hashes/${{ matrix.image }}-${{ matrix.runner }}.txt)"

      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.image }}-${{ matrix.runner }}
          path: hashes/
          retention-days: 1

  # Compare hashes across all runners
  verify-cross-machine:
    name: Reproducible Verify
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all hash artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-hashes
          pattern: hash-*
          merge-multiple: true

      - name: Compare hashes across machines
        run: |
          echo "=== Collected Hashes ==="
          for f in all-hashes/*.txt; do
            echo "$(basename $f .txt): $(cat $f)"
          done
          echo ""

          # Check sequencer hashes match across runners
          echo "=== Verifying Sequencer ==="
          SEQUENCER_HASHES=$(cat all-hashes/sequencer-*.txt | sort -u)
          SEQUENCER_COUNT=$(echo "$SEQUENCER_HASHES" | wc -l)

          if [ "$SEQUENCER_COUNT" -ne 1 ]; then
            echo "::error::Cross-machine reproducibility failed for sequencer!"
            echo "Different runners produced different hashes:"
            for f in all-hashes/sequencer-*.txt; do
              echo "  $(basename $f .txt): $(cat $f)"
            done
            exit 1
          fi
          echo "::notice::Sequencer hash verified across all runners: $SEQUENCER_HASHES"

          # Check validator hashes match across runners
          echo ""
          echo "=== Verifying Validator ==="
          VALIDATOR_HASHES=$(cat all-hashes/validator-*.txt | sort -u)
          VALIDATOR_COUNT=$(echo "$VALIDATOR_HASHES" | wc -l)

          if [ "$VALIDATOR_COUNT" -ne 1 ]; then
            echo "::error::Cross-machine reproducibility failed for validator!"
            echo "Different runners produced different hashes:"
            for f in all-hashes/validator-*.txt; do
              echo "  $(basename $f .txt): $(cat $f)"
            done
            exit 1
          fi
          echo "::notice::Validator hash verified across all runners: $VALIDATOR_HASHES"

          echo ""
          echo "=== All Reproducibility Checks Passed ==="
          echo "Sequencer: $SEQUENCER_HASHES"
          echo "Validator: $VALIDATOR_HASHES"

          # Save verified hashes for publish job (trim whitespace)
          echo "sequencer=$(echo "$SEQUENCER_HASHES" | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          echo "validator=$(echo "$VALIDATOR_HASHES" | tr -d '[:space:]')" >> $GITHUB_OUTPUT
        id: hashes

    outputs:
      sequencer_hash: ${{ steps.hashes.outputs.sequencer }}
      validator_hash: ${{ steps.hashes.outputs.validator }}

  # Publish reproducible images to Artifact Registry after verification passes
  publish-reproducible:
    name: Reproducible Publish ${{ matrix.image }}
    needs: verify-cross-machine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    strategy:
      fail-fast: false
      max-parallel: 1  # Sequential builds to preserve reproducibility
      matrix:
        include:
          - image: sequencer
            dockerfile: docker/reproducible/sequencer.Dockerfile
          - image: validator
            dockerfile: docker/reproducible/validator.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Get BuildKit version
        id: buildkit
        run: echo "version=$(cat docker/reproducible/buildkit.version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:${{ steps.buildkit.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Generate image tags
        id: tags
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="synddb-${{ matrix.image }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "tags=$REGISTRY/$IMAGE:$VERSION,$REGISTRY/$IMAGE:latest" >> $GITHUB_OUTPUT
            else
              echo "tags=$REGISTRY/$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            fi
            echo "primary_tag=$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/example-app" ]]; then
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA,$REGISTRY/$IMAGE:edge" >> $GITHUB_OUTPUT
            echo "primary_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "primary_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Get verified hash
        id: hash
        run: |
          if [[ "${{ matrix.image }}" == "sequencer" ]]; then
            echo "verified=${{ needs.verify-cross-machine.outputs.sequencer_hash }}" >> $GITHUB_OUTPUT
          else
            echo "verified=${{ needs.verify-cross-machine.outputs.validator_hash }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/synddb-${{ matrix.image }}"
          PRIMARY_TAG="${{ steps.tags.outputs.primary_tag }}"

          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f ${{ matrix.dockerfile }} \
            -t $IMAGE:$PRIMARY_TAG \
            .

          BUILT_HASH=$(docker inspect $IMAGE:$PRIMARY_TAG --format='{{.Id}}')
          VERIFIED_HASH="${{ steps.hash.outputs.verified }}"

          echo "Built hash:    $BUILT_HASH"
          echo "Verified hash: $VERIFIED_HASH"

          if [ -z "$VERIFIED_HASH" ]; then
            echo "::error::Verified hash is empty! Check verify-cross-machine job."
            exit 1
          fi

          if [ "$BUILT_HASH" != "$VERIFIED_HASH" ]; then
            echo "::error::Publish build hash doesn't match verified hash!"
            echo "This indicates a reproducibility failure on the publish runner."
            exit 1
          fi

          echo "::notice::Hash verification passed for ${{ matrix.image }}"

          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            docker tag $IMAGE:$PRIMARY_TAG $TAG
            docker push $TAG
            echo "::notice::Pushed $TAG"
          done

      - name: Sign images
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            cosign sign --yes "$TAG"
            echo "::notice::Signed $TAG"
          done

      - name: Summary
        run: |
          {
            echo "## Reproducible ${{ matrix.image }}"
            echo ""
            echo "Tags: \`${{ steps.tags.outputs.tags }}\`"
            echo ""
            echo "Verified hash: \`${{ steps.hash.outputs.verified }}\`"
          } >> $GITHUB_STEP_SUMMARY

  # Build and publish non-reproducible images (no TEE attestation required)
  # Only builds images that have changed files
  publish-standard:
    name: Standard Publish ${{ matrix.image }}
    needs: detect-changes
    # Only run if this specific image has changes, or on manual/tag triggers
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (matrix.image == 'synddb-relayer' && needs.detect-changes.outputs.relayer == 'true') ||
      (matrix.image == 'proof-service' && needs.detect-changes.outputs.proof-service == 'true') ||
      (matrix.image == 'price-oracle' && needs.detect-changes.outputs.price-oracle == 'true') ||
      (matrix.image == 'price-oracle-validator' && needs.detect-changes.outputs.price-oracle-validator == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: synddb-relayer
            dockerfile: docker/relayer.Dockerfile
            cache-scope: relayer
            change-key: relayer
          - image: proof-service
            dockerfile: services/proof-service/Dockerfile
            cache-scope: proof-service
            change-key: proof-service
          - image: price-oracle
            dockerfile: examples/price-oracle/Dockerfile
            cache-scope: price-oracle
            change-key: price-oracle
          - image: price-oracle-validator
            dockerfile: examples/price-oracle/validator.Dockerfile
            cache-scope: price-oracle-validator
            change-key: price-oracle-validator

    steps:
      - name: Check if should build
        id: should-build
        run: |
          # On manual trigger or tag, always build
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building ${{ matrix.image }} (manual/tag trigger)"
            exit 0
          fi

          # Check change detection output
          CHANGE_KEY="${{ matrix.change-key }}"
          case "$CHANGE_KEY" in
            relayer)
              CHANGED="${{ needs.detect-changes.outputs.relayer }}"
              ;;
            proof-service)
              CHANGED="${{ needs.detect-changes.outputs.proof-service }}"
              ;;
            price-oracle)
              CHANGED="${{ needs.detect-changes.outputs.price-oracle }}"
              ;;
            price-oracle-validator)
              CHANGED="${{ needs.detect-changes.outputs.price-oracle-validator }}"
              ;;
          esac

          if [[ "$CHANGED" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Building ${{ matrix.image }} (files changed)"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.image }} (no changes)"
          fi

      - name: Free disk space
        if: steps.should-build.outputs.should_build == 'true'
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: false
          remove_swap: false

      - uses: actions/checkout@v4
        if: steps.should-build.outputs.should_build == 'true'

      - name: Authenticate to Google Cloud
        if: steps.should-build.outputs.should_build == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.should-build.outputs.should_build == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.should-build.outputs.should_build == 'true'
        run: gcloud auth configure-docker ${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        if: steps.should-build.outputs.should_build == 'true'
        uses: sigstore/cosign-installer@v4.0.0

      - name: Generate image tags
        if: steps.should-build.outputs.should_build == 'true'
        id: tags
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ matrix.image }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "tags=$REGISTRY/$IMAGE:$VERSION,$REGISTRY/$IMAGE:latest" >> $GITHUB_OUTPUT
            else
              echo "tags=$REGISTRY/$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/example-app" ]]; then
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA,$REGISTRY/$IMAGE:edge" >> $GITHUB_OUTPUT
          else
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          provenance: mode=max
          sbom: true

      - name: Sign images
        if: steps.should-build.outputs.should_build == 'true'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            cosign sign --yes "$TAG"
            echo "::notice::Signed $TAG"
          done

      - name: Summary
        if: steps.should-build.outputs.should_build == 'true'
        run: |
          {
            echo "## ${{ matrix.image }}"
            echo ""
            echo "Tags: \`${{ steps.tags.outputs.tags }}\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Skip notice
        if: steps.should-build.outputs.should_build == 'false'
        run: |
          {
            echo "## ${{ matrix.image }}"
            echo ""
            echo "Skipped - no relevant file changes detected."
          } >> $GITHUB_STEP_SUMMARY
