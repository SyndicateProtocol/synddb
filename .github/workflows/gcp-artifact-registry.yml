name: GCP Artifact Registry

# Build and publish Docker images to Artifact Registry.
#
# This workflow handles two types of images:
# 1. Reproducible TEE images (sequencer, validator) - bit-for-bit reproducible
#    for Confidential Space attestation where image hash must be verifiable
# 2. Standard images (relayer, proof-service, price-oracle) - regular builds
#    without reproducibility requirements

on:
  push:
    branches:
      - main
      - example-app
    tags:
      - 'v*'  # Release tags (e.g., v1.0.0)
    paths:
      - "docker/**"
      - "crates/**"
      - "services/**"
      - "examples/price-oracle/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/gcp-artifact-registry.yml"

  # Allow manual triggering for verification before releases
  workflow_dispatch:

# Queue builds instead of running concurrently to prevent race conditions where
# an older build finishing after a newer one overwrites the latest image.
# Cancellation is also avoided to ensure no builds are skipped.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Build on multiple runners to verify cross-machine reproducibility
  build:
    name: Reproducible Build (${{ matrix.runner }}, ${{ matrix.image }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04]
        image: [sequencer, validator]

    steps:
      - uses: actions/checkout@v4

      # Read BuildKit version from shared config (single source of truth)
      - name: Get BuildKit version
        id: buildkit
        run: echo "version=$(cat docker/reproducible/buildkit.version)" >> $GITHUB_OUTPUT

      # Pin BuildKit version for reproducibility
      # Latest versions: https://github.com/moby/buildkit/releases
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:${{ steps.buildkit.outputs.version }}

      - name: Build image (attempt 1)
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f docker/reproducible/${{ matrix.image }}.Dockerfile \
            -t ${{ matrix.image }}:build1 \
            .

      - name: Build image (attempt 2)
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f docker/reproducible/${{ matrix.image }}.Dockerfile \
            -t ${{ matrix.image }}:build2 \
            .

      - name: Verify same-machine reproducibility
        run: |
          HASH1=$(docker inspect ${{ matrix.image }}:build1 --format='{{.Id}}')
          HASH2=$(docker inspect ${{ matrix.image }}:build2 --format='{{.Id}}')

          echo "Build 1: $HASH1"
          echo "Build 2: $HASH2"

          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::Same-machine reproducibility failed!"
            echo "Two builds on the same machine produced different hashes."
            exit 1
          fi

          echo "::notice::Same-machine reproducibility verified for ${{ matrix.image }} on ${{ matrix.runner }}"

      - name: Save image hash
        run: |
          mkdir -p hashes
          docker inspect ${{ matrix.image }}:build1 --format='{{.Id}}' > hashes/${{ matrix.image }}-${{ matrix.runner }}.txt
          echo "Hash: $(cat hashes/${{ matrix.image }}-${{ matrix.runner }}.txt)"

      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.image }}-${{ matrix.runner }}
          path: hashes/
          retention-days: 1

  # Compare hashes across all runners
  verify-cross-machine:
    name: Reproducible Verify
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all hash artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-hashes
          pattern: hash-*
          merge-multiple: true

      - name: Compare hashes across machines
        run: |
          echo "=== Collected Hashes ==="
          for f in all-hashes/*.txt; do
            echo "$(basename $f .txt): $(cat $f)"
          done
          echo ""

          # Check sequencer hashes match across runners
          echo "=== Verifying Sequencer ==="
          SEQUENCER_HASHES=$(cat all-hashes/sequencer-*.txt | sort -u)
          SEQUENCER_COUNT=$(echo "$SEQUENCER_HASHES" | wc -l)

          if [ "$SEQUENCER_COUNT" -ne 1 ]; then
            echo "::error::Cross-machine reproducibility failed for sequencer!"
            echo "Different runners produced different hashes:"
            for f in all-hashes/sequencer-*.txt; do
              echo "  $(basename $f .txt): $(cat $f)"
            done
            exit 1
          fi
          echo "::notice::Sequencer hash verified across all runners: $SEQUENCER_HASHES"

          # Check validator hashes match across runners
          echo ""
          echo "=== Verifying Validator ==="
          VALIDATOR_HASHES=$(cat all-hashes/validator-*.txt | sort -u)
          VALIDATOR_COUNT=$(echo "$VALIDATOR_HASHES" | wc -l)

          if [ "$VALIDATOR_COUNT" -ne 1 ]; then
            echo "::error::Cross-machine reproducibility failed for validator!"
            echo "Different runners produced different hashes:"
            for f in all-hashes/validator-*.txt; do
              echo "  $(basename $f .txt): $(cat $f)"
            done
            exit 1
          fi
          echo "::notice::Validator hash verified across all runners: $VALIDATOR_HASHES"

          echo ""
          echo "=== All Reproducibility Checks Passed ==="
          echo "Sequencer: $SEQUENCER_HASHES"
          echo "Validator: $VALIDATOR_HASHES"

          # Save verified hashes for publish job (trim whitespace)
          echo "sequencer=$(echo "$SEQUENCER_HASHES" | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          echo "validator=$(echo "$VALIDATOR_HASHES" | tr -d '[:space:]')" >> $GITHUB_OUTPUT
        id: hashes

    outputs:
      sequencer_hash: ${{ steps.hashes.outputs.sequencer }}
      validator_hash: ${{ steps.hashes.outputs.validator }}

  # Publish reproducible images to Artifact Registry after verification passes
  publish-reproducible:
    name: Reproducible Publish ${{ matrix.image }}
    needs: verify-cross-machine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    strategy:
      fail-fast: false
      max-parallel: 1  # Sequential builds to preserve reproducibility
      matrix:
        include:
          - image: sequencer
            dockerfile: docker/reproducible/sequencer.Dockerfile
          - image: validator
            dockerfile: docker/reproducible/validator.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Get BuildKit version
        id: buildkit
        run: echo "version=$(cat docker/reproducible/buildkit.version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:${{ steps.buildkit.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Generate image tags
        id: tags
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="synddb-${{ matrix.image }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "tags=$REGISTRY/$IMAGE:$VERSION,$REGISTRY/$IMAGE:latest" >> $GITHUB_OUTPUT
            else
              echo "tags=$REGISTRY/$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            fi
            echo "primary_tag=$VERSION" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/example-app" ]]; then
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA,$REGISTRY/$IMAGE:edge" >> $GITHUB_OUTPUT
            echo "primary_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "primary_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Get verified hash
        id: hash
        run: |
          if [[ "${{ matrix.image }}" == "sequencer" ]]; then
            echo "verified=${{ needs.verify-cross-machine.outputs.sequencer_hash }}" >> $GITHUB_OUTPUT
          else
            echo "verified=${{ needs.verify-cross-machine.outputs.validator_hash }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        id: build
        env:
          SOURCE_DATE_EPOCH: 0
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/synddb-${{ matrix.image }}"
          PRIMARY_TAG="${{ steps.tags.outputs.primary_tag }}"

          docker buildx build \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg SOURCE_DATE_EPOCH=0 \
            --platform linux/amd64 \
            --output type=docker,rewrite-timestamp=true \
            -f ${{ matrix.dockerfile }} \
            -t $IMAGE:$PRIMARY_TAG \
            .

          BUILT_HASH=$(docker inspect $IMAGE:$PRIMARY_TAG --format='{{.Id}}')
          VERIFIED_HASH="${{ steps.hash.outputs.verified }}"

          echo "Built hash:    $BUILT_HASH"
          echo "Verified hash: $VERIFIED_HASH"

          if [ -z "$VERIFIED_HASH" ]; then
            echo "::error::Verified hash is empty! Check verify-cross-machine job."
            exit 1
          fi

          if [ "$BUILT_HASH" != "$VERIFIED_HASH" ]; then
            echo "::error::Publish build hash doesn't match verified hash!"
            echo "This indicates a reproducibility failure on the publish runner."
            exit 1
          fi

          echo "::notice::Hash verification passed for ${{ matrix.image }}"

          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            docker tag $IMAGE:$PRIMARY_TAG $TAG
            docker push $TAG
            echo "::notice::Pushed $TAG"
          done

          # Get the digest from the registry for the first tag (all tags point to same digest)
          FIRST_TAG="${TAGS[0]}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $FIRST_TAG | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "::notice::Image digest: $DIGEST"

      - name: Sign image by digest (cosign)
        run: |
          # Sign by digest (not tag) to ensure signature binds to exact image content.
          # Tags are mutable and could be reassigned; digests are immutable content hashes.
          IMAGE="${{ steps.build.outputs.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "$IMAGE@$DIGEST"
          echo "::notice::Signed $IMAGE@$DIGEST"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Sign image digest (secp256k1)
        id: image_sig
        if: ${{ vars.IMAGE_SIGNER_ADDRESS != '' }}
        env:
          PRIVATE_KEY: ${{ secrets.IMAGE_SIGNER_PRIVATE_KEY }}
          EXPECTED_SIGNER: ${{ vars.IMAGE_SIGNER_ADDRESS }}
        run: |
          # Verify private key matches expected signer address
          DERIVED_ADDRESS=$(cast wallet address --private-key "$PRIVATE_KEY")
          if [[ "$DERIVED_ADDRESS" != "$EXPECTED_SIGNER" ]]; then
            echo "::error::IMAGE_SIGNER_ADDRESS ($EXPECTED_SIGNER) doesn't match private key (derives to $DERIVED_ADDRESS)"
            exit 1
          fi

          # Sign the image digest with secp256k1 for on-chain TEE bootstrap verification.
          # The signature is over keccak256(digest_string) where digest_string is "sha256:abc123..."
          DIGEST="${{ steps.build.outputs.digest }}"

          # Compute keccak256 of the digest string (including the "sha256:" prefix)
          MESSAGE_HASH=$(cast keccak "$DIGEST")

          # Sign the hash directly (no EIP-191 prefix)
          SIGNATURE=$(cast wallet sign --private-key "$PRIVATE_KEY" --no-hash "$MESSAGE_HASH")

          # Verify signature before publishing
          if ! cast wallet verify --no-hash --address "$EXPECTED_SIGNER" "$MESSAGE_HASH" "$SIGNATURE"; then
            echo "::error::Signature verification failed!"
            exit 1
          fi

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "::notice::Image signature: $SIGNATURE"
          echo "::notice::Signer address: $EXPECTED_SIGNER (verified)"

      - name: Attach signature artifact
        if: ${{ steps.image_sig.outputs.signature != '' }}
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/synddb-${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          # Create signature payload
          cat > signature.json <<EOF
          {
            "digest": "$DIGEST",
            "signature": "${{ steps.image_sig.outputs.signature }}",
            "signer": "${{ vars.IMAGE_SIGNER_ADDRESS }}",
            "signatureType": "secp256k1-keccak256"
          }
          EOF

          # Attach as OCI artifact referrer (immutable, linked to digest)
          oras attach \
            "$IMAGE@$DIGEST" \
            --artifact-type application/vnd.syndicate.image-signature.v1+json \
            signature.json:application/json

          echo "::notice::Attached signature artifact to $IMAGE@$DIGEST"

      - name: Summary
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/synddb-${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          {
            echo "## Reproducible ${{ matrix.image }}"
            echo ""
            echo "Tags: \`${{ steps.tags.outputs.tags }}\`"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Verified hash: \`${{ steps.hash.outputs.verified }}\`"
            echo ""
            if [[ -n "${{ steps.image_sig.outputs.signature }}" ]]; then
              echo "### Image Signature (secp256k1)"
              echo ""
              echo "Discover signature artifacts:"
              echo "\`\`\`bash"
              echo "oras discover $IMAGE@$DIGEST"
              echo "\`\`\`"
              echo ""
              echo "Signer: \`${{ vars.IMAGE_SIGNER_ADDRESS }}\`"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # Build and publish non-reproducible images (no TEE attestation required)
  publish-standard:
    name: Standard Publish ${{ matrix.image }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: synddb-relayer
            dockerfile: docker/relayer.Dockerfile
            cache-scope: relayer
            runner: ubuntu-latest
            timeout: 30
          - image: proof-service
            dockerfile: services/proof-service/Dockerfile.risc0
            cache-scope: proof-service
            # Larger runner for RISC Zero toolchain compilation (memory intensive)
            runner: shared-large-01
            timeout: 60
          - image: price-oracle
            dockerfile: examples/price-oracle/Dockerfile
            cache-scope: price-oracle
            runner: ubuntu-latest
            timeout: 30
          - image: price-oracle-validator
            dockerfile: examples/price-oracle/validator.Dockerfile
            cache-scope: price-oracle-validator
            runner: ubuntu-latest
            timeout: 30

    steps:
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: false
          remove_swap: false

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Generate image tags
        id: tags
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ matrix.image }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "tags=$REGISTRY/$IMAGE:$VERSION,$REGISTRY/$IMAGE:latest" >> $GITHUB_OUTPUT
            else
              echo "tags=$REGISTRY/$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/example-app" ]]; then
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA,$REGISTRY/$IMAGE:edge" >> $GITHUB_OUTPUT
          else
            echo "tags=$REGISTRY/$IMAGE:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          provenance: mode=max
          sbom: true

      - name: Sign image by digest (cosign)
        run: |
          # Sign by digest (not tag) to ensure signature binds to exact image content.
          # Tags are mutable and could be reassigned; digests are immutable content hashes.
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "$IMAGE@$DIGEST"
          echo "::notice::Signed $IMAGE@$DIGEST"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install oras
        uses: oras-project/setup-oras@v1

      # Sign image before installing any additional toolchains to minimize attack surface.
      # The secp256k1 signature only requires Foundry (cast) which is already installed.
      - name: Sign image digest (secp256k1)
        id: image_sig
        if: ${{ vars.IMAGE_SIGNER_ADDRESS != '' }}
        env:
          PRIVATE_KEY: ${{ secrets.IMAGE_SIGNER_PRIVATE_KEY }}
          EXPECTED_SIGNER: ${{ vars.IMAGE_SIGNER_ADDRESS }}
        run: |
          # Verify private key matches expected signer address
          DERIVED_ADDRESS=$(cast wallet address --private-key "$PRIVATE_KEY")
          if [[ "$DERIVED_ADDRESS" != "$EXPECTED_SIGNER" ]]; then
            echo "::error::IMAGE_SIGNER_ADDRESS ($EXPECTED_SIGNER) doesn't match private key (derives to $DERIVED_ADDRESS)"
            exit 1
          fi

          # Sign the image digest with secp256k1 for on-chain TEE bootstrap verification.
          # The signature is over keccak256(digest_string) where digest_string is "sha256:abc123..."
          DIGEST="${{ steps.build.outputs.digest }}"

          # Compute keccak256 of the digest string (including the "sha256:" prefix)
          MESSAGE_HASH=$(cast keccak "$DIGEST")

          # Sign the hash directly (no EIP-191 prefix)
          SIGNATURE=$(cast wallet sign --private-key "$PRIVATE_KEY" --no-hash "$MESSAGE_HASH")

          # Verify signature before publishing
          if ! cast wallet verify --no-hash --address "$EXPECTED_SIGNER" "$MESSAGE_HASH" "$SIGNATURE"; then
            echo "::error::Signature verification failed!"
            exit 1
          fi

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "::notice::Image signature: $SIGNATURE"
          echo "::notice::Signer address: $EXPECTED_SIGNER (verified)"

      - name: Attach signature artifact
        if: ${{ steps.image_sig.outputs.signature != '' }}
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          # Create signature payload
          cat > signature.json <<EOF
          {
            "digest": "$DIGEST",
            "signature": "${{ steps.image_sig.outputs.signature }}",
            "signer": "${{ vars.IMAGE_SIGNER_ADDRESS }}",
            "signatureType": "secp256k1-keccak256"
          }
          EOF

          # Attach as OCI artifact referrer (immutable, linked to digest)
          oras attach \
            "$IMAGE@$DIGEST" \
            --artifact-type application/vnd.syndicate.image-signature.v1+json \
            signature.json:application/json

          echo "::notice::Attached signature artifact to $IMAGE@$DIGEST"

      # Generate RISC Zero image ID for proof-service (contains embedded RISC Zero ELF).
      # This happens after signing since image ID is metadata, not security-critical.
      - name: Install Rust toolchain
        if: ${{ matrix.image == 'proof-service' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Cache Cargo dependencies
        if: ${{ matrix.image == 'proof-service' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tests/confidential-space/risc0/script

      - name: Install RISC Zero toolchain
        if: ${{ matrix.image == 'proof-service' }}
        run: |
          set -e
          # Version must match risc0-zkvm crate version in Cargo.toml
          RISC0_VERSION="3.0.4"
          for i in {1..3}; do
            echo "Attempt $i to install RISC Zero toolchain v${RISC0_VERSION}..."
            if curl -L https://risczero.com/install | bash && \
               ~/.risc0/bin/rzup install cargo-risczero ${RISC0_VERSION} && \
               ~/.risc0/bin/rzup install risc0-groth16 && \
               ~/.risc0/bin/r0vm --version; then
              break
            else
              echo "Attempt $i failed. Retrying in 5 seconds..."
              sleep 5
            fi
          done

      - name: Generate RISC Zero image ID
        id: image_id
        if: ${{ matrix.image == 'proof-service' }}
        run: |
          # Use the test script to generate image ID (same as risc0-ci.yml)
          # The script's build.rs uses risc0-build::embed_methods() to compile the guest
          cd tests/confidential-space/risc0/script
          IMAGE_ID=$(cargo run --release --bin risc0-prover -- --execute --sample ../../samples/samples_*.json 2>&1 | grep "Image ID (bytes32)" | awk '{print $NF}')

          # Validate image_id format (0x followed by 64 hex chars)
          if [[ ! "$IMAGE_ID" =~ ^0x[a-fA-F0-9]{64}$ ]]; then
            echo "::error::Invalid image_id format: $IMAGE_ID"
            exit 1
          fi

          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "::notice::RISC Zero Image ID: $IMAGE_ID"

      - name: Attach image ID artifact
        if: ${{ matrix.image == 'proof-service' && steps.image_id.outputs.image_id != '' }}
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          # Create image ID payload
          cat > image_id.json <<EOF
          {
            "imageId": "${{ steps.image_id.outputs.image_id }}",
            "programName": "gcp-cs-attestation-risc0-program",
            "risc0Version": "3.0.4"
          }
          EOF

          # Attach as OCI artifact referrer (immutable, linked to digest)
          oras attach \
            "$IMAGE@$DIGEST" \
            --artifact-type application/vnd.syndicate.risc0-image-id.v1+json \
            image_id.json:application/json

          echo "::notice::Attached image ID artifact to $IMAGE@$DIGEST"

      - name: Summary
        run: |
          REGISTRY="${{ vars.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}"
          IMAGE="$REGISTRY/${{ matrix.image }}"
          DIGEST="${{ steps.build.outputs.digest }}"

          {
            echo "## ${{ matrix.image }}"
            echo ""
            echo "Tags: \`${{ steps.tags.outputs.tags }}\`"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            if [[ -n "${{ steps.image_id.outputs.image_id }}" ]]; then
              echo "### RISC Zero Image ID"
              echo ""
              echo "\`\`\`"
              echo "${{ steps.image_id.outputs.image_id }}"
              echo "\`\`\`"
              echo ""
            fi
            if [[ -n "${{ steps.image_sig.outputs.signature }}" ]]; then
              echo "### Image Signature (secp256k1)"
              echo ""
              echo "Discover artifacts:"
              echo "\`\`\`bash"
              echo "oras discover $IMAGE@$DIGEST"
              echo "\`\`\`"
              echo ""
              echo "Signer: \`${{ vars.IMAGE_SIGNER_ADDRESS }}\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
