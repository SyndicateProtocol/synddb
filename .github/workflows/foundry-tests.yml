# This workflow runs our Foundry tests and contract checks on the smart contracts in `contracts/`.
# Whenever a change is made in the contracts directory, this workflow makes sure everything still builds, passes tests, and follows formatting standards.
# https://github.com/foundry-rs/foundry

name: Foundry Tests

on:
  # Run workflow on every push to main (always run to ensure cross-service compatibility)
  push:
    branches:
      - main
  # Only run on pull requests when contracts, bindings, or deploy scripts are modified
  pull_request:
    paths:
      - "contracts/**"
      - "crates/synddb-bindings/**"
      - "scripts/deploy-local.sh"
      - ".github/workflows/foundry-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  contracts-check:
    name: Contracts Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "contracts"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

  deploy-script:
    name: Deploy Script Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run deploy script
        run: |
          ./scripts/deploy-local.sh

      - name: Verify contracts are deployed
        run: |
          # Load RPC URL from .env.defaults
          set -a
          source .env.defaults
          set +a

          # Get addresses from deployment output (not hardcoded)
          ADDRESSES=$(cat .synddb/local-addresses.json)
          BRIDGE=$(echo "$ADDRESSES" | jq -r '.contracts.bridge')
          WETH=$(echo "$ADDRESSES" | jq -r '.contracts.weth')
          ORACLE=$(echo "$ADDRESSES" | jq -r '.contracts.priceOracle')

          # Check that contracts have code at deployed addresses
          echo "Verifying Bridge at $BRIDGE..."
          BRIDGE_CODE=$(cast code "$BRIDGE" --rpc-url "$ANVIL_RPC_URL")
          if [ "$BRIDGE_CODE" == "0x" ]; then
            echo "Bridge contract has no code"
            exit 1
          fi
          echo "✓ Bridge contract verified"

          echo "Verifying WETH at $WETH..."
          WETH_CODE=$(cast code "$WETH" --rpc-url "$ANVIL_RPC_URL")
          if [ "$WETH_CODE" == "0x" ]; then
            echo "WETH contract has no code"
            exit 1
          fi
          echo "✓ WETH contract verified"

          echo "Verifying PriceOracle at $ORACLE..."
          ORACLE_CODE=$(cast code "$ORACLE" --rpc-url "$ANVIL_RPC_URL")
          if [ "$ORACLE_CODE" == "0x" ]; then
            echo "PriceOracle contract has no code"
            exit 1
          fi
          echo "✓ PriceOracle contract verified"

          echo "All contracts verified successfully"

      - name: Cleanup
        if: always()
        run: |
          pkill -f "anvil" || true

  bindings-check:
    name: Rust Bindings Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Regenerate Rust bindings
        working-directory: contracts
        run: |
          forge bind --crate-name synddb-bindings -b ../crates/synddb-bindings --overwrite

      - name: Check for binding drift
        run: |
          if ! git diff --exit-code crates/synddb-bindings/; then
            echo "::error::Rust bindings are out of sync with Solidity contracts!"
            echo "If you have lefthook installed, amend your commit and the pre-commit hook will regenerate bindings automatically."
            echo "Otherwise, run: cd contracts && forge bind --crate-name synddb-bindings -b ../crates/synddb-bindings --overwrite"
            exit 1
          fi
          echo "✓ Rust bindings are up to date"
