# This workflow runs our Foundry tests and contract checks on the smart contracts in `contracts/`.
# Whenever a change is made in the contracts directory, this workflow makes sure everything still builds, passes tests, and follows formatting standards.
# https://github.com/foundry-rs/foundry

name: Foundry Tests

on:
  # Run workflow on every push to main (always run to ensure cross-service compatibility)
  push:
    branches:
      - main
  # Only run on pull requests when contracts or deploy scripts are modified
  pull_request:
    paths:
      - "contracts/**"
      - "scripts/deploy-local.sh"
      - ".github/workflows/foundry-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  contracts-check:
    name: Contracts Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "contracts"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

  deploy-script:
    name: Deploy Script Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run deploy script
        run: |
          ./scripts/deploy-local.sh

      - name: Verify deterministic addresses
        run: |
          # Load expected addresses from .env.defaults (single source of truth)
          set -a
          source .env.defaults
          set +a

          # Check that addresses match expected values
          ADDRESSES=$(cat .synddb/local-addresses.json)

          # Verify WETH address (nonce 0)
          WETH=$(echo "$ADDRESSES" | jq -r '.contracts.weth')
          if [ "$WETH" != "$WETH_CONTRACT_ADDRESS" ]; then
            echo "WETH address mismatch: $WETH (expected $WETH_CONTRACT_ADDRESS)"
            exit 1
          fi

          # Verify Bridge address (nonce 1)
          BRIDGE=$(echo "$ADDRESSES" | jq -r '.contracts.bridge')
          if [ "$BRIDGE" != "$BRIDGE_CONTRACT_ADDRESS" ]; then
            echo "Bridge address mismatch: $BRIDGE (expected $BRIDGE_CONTRACT_ADDRESS)"
            exit 1
          fi

          # Verify PriceOracle address (nonce 3, after grantRole)
          ORACLE=$(echo "$ADDRESSES" | jq -r '.contracts.priceOracle')
          if [ "$ORACLE" != "$PRICE_ORACLE_CONTRACT_ADDRESS" ]; then
            echo "PriceOracle address mismatch: $ORACLE (expected $PRICE_ORACLE_CONTRACT_ADDRESS)"
            exit 1
          fi

          echo "All addresses verified successfully"

      - name: Verify contracts are deployed
        run: |
          # Load addresses from .env.defaults
          set -a
          source .env.defaults
          set +a

          # Check that contracts have code at expected addresses
          BRIDGE_CODE=$(cast code "$BRIDGE_CONTRACT_ADDRESS" --rpc-url "$ANVIL_RPC_URL")
          if [ "$BRIDGE_CODE" == "0x" ]; then
            echo "Bridge contract has no code"
            exit 1
          fi
          echo "Bridge contract verified at $BRIDGE_CONTRACT_ADDRESS"

      - name: Cleanup
        if: always()
        run: |
          pkill -f "anvil" || true
