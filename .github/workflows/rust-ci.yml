name: Rust CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review] # Run on all non-draft PRs
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-ci.yml"
      - "tests/**"

  # Run on main pushes
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"
  # Rust version for consistency across jobs
  RUST_VERSION: "1.91.0"

jobs:
  taplo:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Cargo.toml Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo binaries
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          cache-all-crates: true

      - name: Install Taplo
        uses: clechasseur/rs-cargo@v2
        with:
          command: install
          args: taplo-cli@0.9.0

      - name: Validate Cargo.toml files
        run: taplo lint "**/Cargo.toml" --verbose

      - name: Check Cargo.toml formatting
        run: taplo fmt --check "**/Cargo.toml" --verbose

  machete:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo binaries
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          cache-all-crates: true

      - name: Install cargo-machete
        uses: clechasseur/rs-cargo@v2
        with:
          command: install
          args: cargo-machete@0.7.0

      - name: Check for unused dependencies
        uses: clechasseur/rs-cargo@v2
        with:
          command: machete

      - name: Check for unused dependencies (tests/confidential-space)
        run: |
          cargo machete tests/confidential-space
          cargo machete tests/confidential-space/gcp-confidential-space

  fmt:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rustfmt

      - name: Check Rust formatting
        run: cargo +nightly fmt --all --check

      - name: Check Rust formatting (tests/confidential-space)
        run: |
          cargo +nightly fmt --all --check --manifest-path tests/confidential-space/Cargo.toml
          cargo +nightly fmt --all --check --manifest-path tests/confidential-space/gcp-confidential-space/Cargo.toml

  clippy:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Run Clippy (tests/confidential-space)
        run: |
          cargo clippy --all-targets --all-features --manifest-path tests/confidential-space/Cargo.toml
          cargo clippy --all-targets --all-features --manifest-path tests/confidential-space/gcp-confidential-space/Cargo.toml

      - name: Check documentation builds
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests with nextest
        run: cargo nextest run --workspace --all-features --exclude synddb-e2e --exclude synddb-e2e-gcs

      # Fallback to standard cargo test for doctests (nextest doesn't support them)
      # Note: e2e tests are excluded here and run separately in `e2e.yml`
      - name: Run doctests
        run: cargo test --workspace --doc --exclude synddb-e2e --exclude synddb-e2e-gcs

      - name: Run tests (tests/confidential-space)
        run: cargo test --manifest-path tests/confidential-space/gcp-confidential-space/Cargo.toml

  stress-test:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Session Stress Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build stress test
        run: cargo build --package synddb-benchmark --bin session-stress-test --release

      - name: Build sequencer
        run: cargo build --package synddb-sequencer --release

      - name: Start sequencer
        run: |
          ./target/release/synddb-sequencer &
          echo $! > /tmp/sequencer.pid
          # Wait for sequencer to be healthy
          for i in {1..30}; do
            if curl -s http://localhost:8433/health > /dev/null 2>&1; then
              echo "Sequencer is healthy"
              break
            fi
            echo "Waiting for sequencer... ($i/30)"
            sleep 1
          done
        env:
          # Test signing key (anvil account 0)
          SIGNING_KEY: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

      - name: Run session stress test
        run: |
          ./target/release/session-stress-test --duration 15
        env:
          RUST_LOG: info

      - name: Stop sequencer
        if: always()
        run: |
          if [ -f /tmp/sequencer.pid ]; then
            kill $(cat /tmp/sequencer.pid) || true
          fi

  client-integration:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Client Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build sequencer
        run: cargo build --package synddb-sequencer --release

      - name: Start sequencer
        run: |
          ./target/release/synddb-sequencer &
          echo $! > /tmp/sequencer.pid
          # Wait for sequencer to be healthy
          for i in {1..30}; do
            if curl -s http://localhost:8433/health > /dev/null 2>&1; then
              echo "Sequencer is healthy"
              break
            fi
            echo "Waiting for sequencer... ($i/30)"
            sleep 1
          done
        env:
          # Test signing key (anvil account 0)
          SIGNING_KEY: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

      - name: Run client integration tests
        run: cargo test -p synddb-client --lib -- --ignored --skip attestation
        env:
          RUST_LOG: info

      - name: Stop sequencer
        if: always()
        run: |
          if [ -f /tmp/sequencer.pid ]; then
            kill $(cat /tmp/sequencer.pid) || true
          fi

  fuzzer:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: SQLite Fuzzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run fuzzer tests
        run: cargo test -p synddb-fuzzer --release
        env:
          # Run more proptest iterations in CI
          PROPTEST_CASES: "256"

  e2e-fuzzer:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: E2E Pipeline Fuzzer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run E2E fuzzer tests
        run: cargo test -p synddb-e2e-fuzzer --release
        env:
          # Run proptest iterations in CI
          PROPTEST_CASES: "100"

      - name: Run E2E stress tests
        run: cargo test -p synddb-e2e-fuzzer --release -- --ignored
        env:
          # Fewer iterations for expensive stress tests
          PROPTEST_CASES: "10"

  justfile-validate:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Justfile Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Validate justfile syntax
        run: just --fmt --check

      - name: List available recipes
        run: |
          echo "=== Root recipes ==="
          just --list
          echo ""
          echo "=== Contracts module ==="
          just --list contracts
          echo ""
          echo "=== Examples module ==="
          just --list examples
