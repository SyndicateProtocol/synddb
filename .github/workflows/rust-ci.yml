name: Rust CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review] # Run on all non-draft PRs
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust-ci.yml"
      - "tests/**"
      - "justfile"

  # Run on main pushes
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint-toml:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: TOML Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache cargo binaries
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          cache-all-crates: true

      - name: Install Taplo
        uses: clechasseur/rs-cargo@v2
        with:
          command: install
          args: taplo-cli@0.9.0

      - name: Check TOML formatting
        run: just lint-toml

  lint-deps:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache cargo binaries
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          cache-all-crates: true

      - name: Install cargo-machete
        uses: clechasseur/rs-cargo@v2
        with:
          command: install
          args: cargo-machete@0.7.0

      - name: Check for unused dependencies
        run: just lint-deps

      - name: Check for unused dependencies (tests/confidential-space)
        run: cargo machete tests/confidential-space

  lint-fmt:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rustfmt

      - name: Check Rust formatting
        run: just lint-fmt

      - name: Check Rust formatting (tests/confidential-space)
        run: cargo +nightly fmt --all --check --manifest-path tests/confidential-space/Cargo.toml

  lint:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable  # Uses version from rust-toolchain.toml

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: just lint

      - name: Run Clippy (tests/confidential-space)
        run: cargo clippy --all-targets --all-features --manifest-path tests/confidential-space/Cargo.toml

      - name: Check documentation builds
        run: just lint-docs
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: just test

      # Fallback to standard cargo test for doctests (nextest doesn't support them)
      - name: Run doctests
        run: cargo test --workspace --doc --exclude synddb-e2e --exclude synddb-e2e-gcs

  test-stress:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Session Stress Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run stress test
        run: just test-stress

  test-integration:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Client Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run client integration tests
        run: just test-integration

  fuzz:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: SQLite Fuzzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run fuzzer tests
        run: just fuzz
        env:
          PROPTEST_CASES: "256"

  fuzz-e2e:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: E2E Pipeline Fuzzer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run E2E fuzzer tests
        run: just fuzz-e2e
        env:
          PROPTEST_CASES: "100"

      - name: Run E2E stress tests
        run: just fuzz-e2e-stress
        env:
          PROPTEST_CASES: "10"

  justfile-validate:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Justfile Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Validate justfile syntax
        run: just --unstable --fmt --check

      - name: List available recipes
        run: |
          echo "=== Root recipes ==="
          just --list
          echo ""
          echo "=== Contracts module ==="
          just --list contracts
          echo ""
          echo "=== Examples module ==="
          just --list examples

  examples:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Examples Compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build crate examples
        run: |
          cargo build --package synddb-client --examples
          cargo build --package synddb-chain-monitor --examples

      - name: Build standalone examples
        run: |
          cargo build --package prediction-market
          cargo build --package price-oracle-validator

  coverage:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --exclude synddb-e2e --exclude synddb-e2e-gcs --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false  # Don't fail if Codecov is unavailable
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit
