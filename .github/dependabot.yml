# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Rust dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      # Group alloy crates together (blockchain primitives)
      alloy:
        patterns:
          - "alloy*"
      # Group tokio ecosystem
      tokio:
        patterns:
          - "tokio*"
      # Group serde ecosystem
      serde:
        patterns:
          - "serde*"
      # Group tracing ecosystem
      tracing:
        patterns:
          - "tracing*"
      # Group axum/tower ecosystem (web framework)
      axum:
        patterns:
          - "axum*"
          - "tower*"
      # Group RISC Zero ecosystem
      risc0:
        patterns:
          - "risc0*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
