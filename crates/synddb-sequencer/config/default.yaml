# Default configuration for synddb-sequencer

database:
  path: "app.db"
  enable_sessions: true

batch:
  max_batch_size: 1048576  # 1MB
  max_batch_age: "1s"
  snapshot_interval: "1h"
  snapshot_threshold: 1000

publish:
  # All DA layers are optional - enable as needed
  celestia: null
  eigenda: null
  ipfs: null
  arweave: null

messages:
  enable_inbound: false
  enable_outbound: false
  api_port: 8432
  chain_rpc_url: null
  bridge_contract: null

tee:
  enable_attestation: false
  gcp_project_id: null
  key_path: null
