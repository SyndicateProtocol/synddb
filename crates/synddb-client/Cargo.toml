[package]
name = "synddb-client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# SQLite with Session Extension support
rusqlite = { workspace = true, features = ["bundled", "session", "hooks"] }

# Async runtime for background sending
tokio = { workspace = true, features = ["rt", "sync", "time"] }

# HTTP client for sending to sequencer
reqwest = { version = "0.11", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"

# Error handling
anyhow = { workspace = true }
thiserror = "1.0"

# Logging
tracing = { workspace = true }

# Channels for background thread
crossbeam-channel = "0.5"

[features]
default = []
# Enable Python bindings via PyO3
python = ["pyo3"]
# Enable Node.js bindings via Neon
nodejs = ["neon"]

[dependencies.pyo3]
version = "0.20"
features = ["extension-module"]
optional = true

[dependencies.neon]
version = "1.0"
optional = true
