# Lefthook - Git hooks manager
# Install: brew install lefthook OR cargo install lefthook
# Setup: just hooks-install
#
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo +nightly fmt --all
      stage_fixed: true
      fail_text: "Rust formatting failed"

    solidity-fmt:
      glob: "*.sol"
      root: "contracts/"
      run: forge fmt
      stage_fixed: true
      fail_text: "Solidity formatting failed"

    toml-fmt:
      glob: "*.toml"
      run: taplo fmt "**/Cargo.toml"
      stage_fixed: true
      fail_text: "TOML formatting failed"

    sol-bindings:
      glob: "contracts/src/**/*.sol"
      run: cd contracts && forge bind --crate-name synddb-bindings -b ../crates/synddb-bindings --overwrite
      stage_fixed: true
      fail_text: "Solidity bindings generation failed"
