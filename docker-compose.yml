# Docker Compose for SyndDB E2E testing
#
# This setup runs:
# 1. Sequencer with local SQLite storage (exposes /da/* API)
# 2. Validator fetching from sequencer via HTTP
# 3. Customer SQLite app (pluggable - swap Dockerfile for your own app)
#
# Usage:
#   docker compose up --build
#   docker compose down -v
#
# To use your own app:
#   Replace docker/customer_app.Dockerfile with your application's Dockerfile.
#   Your app should use synddb-client to wrap SQLite and send changesets to
#   the sequencer at http://sequencer:8433.
#
# Test endpoints:
#   curl http://localhost:8433/health    # Sequencer health
#   curl http://localhost:8433/status    # Sequencer status (sequence number)
#   curl http://localhost:8080/health    # Validator health
#   curl http://localhost:8080/status    # Validator sync status

services:
  sequencer:
    build:
      context: .
      dockerfile: docker/sequencer.Dockerfile
    ports:
      - "8433:8433"
    environment:
      RUST_LOG: info
      BIND_ADDRESS: "0.0.0.0:8433"
      # Anvil's default test private key (DO NOT use in production!)
      SIGNING_KEY: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      # Use local publisher with in-memory SQLite for DA storage
      PUBLISHER_TYPE: local
      LOCAL_STORAGE_PATH: ":memory:"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8433/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  validator:
    build:
      context: .
      dockerfile: docker/validator.Dockerfile
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      BIND_ADDRESS: "0.0.0.0:8080"
      # Must match sequencer's address (derived from SIGNING_KEY above)
      SEQUENCER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      # Use HTTP fetcher to read from sequencer's local DA API
      FETCHER_TYPE: http
      SEQUENCER_URL: "http://sequencer:8433"
      # Use in-memory databases for testing
      DATABASE_PATH: ":memory:"
      STATE_DB_PATH: ":memory:"
      # Faster sync for testing
      SYNC_INTERVAL: "1s"
    depends_on:
      sequencer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Pluggable customer SQLite application
  # Replace docker/customer_app.Dockerfile with your own app's Dockerfile.
  # Currently uses the orderbook benchmark with full SyndDB integration.
  customer_sqlite_app:
    build:
      context: .
      dockerfile: docker/customer_app.Dockerfile
    environment:
      RUST_LOG: info
      # Sequencer URL - the benchmark automatically uses synddb-client when this is set
      SEQUENCER_URL: "http://sequencer:8433"
    volumes:
      - app_data:/data
    depends_on:
      sequencer:
        condition: service_healthy
    # Run the benchmark in simple mode for 60 seconds
    # SEQUENCER_URL env var enables synddb-client integration automatically
    command: ["run", "--db", "/data/orderbook.db", "--simple", "--duration", "60", "--rate", "100"]

  # Session stress test - verifies no SIGSEGV from Session race conditions
  # This test runs continuous transactions with changeset publishing to verify
  # the safe API works correctly under load.
  stress_test:
    build:
      context: .
      dockerfile: docker/stress_test.Dockerfile
    environment:
      RUST_LOG: info
      SEQUENCER_URL: "http://sequencer:8433"
    depends_on:
      sequencer:
        condition: service_healthy
    # Run stress test for 30 seconds
    command: ["--duration", "30"]

volumes:
  app_data:
